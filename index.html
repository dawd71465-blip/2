<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>دانشگاه فرهنگیان | بانک سوالات مصاحبه و گزینش</title>
    <style>
        /* === RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'IRANSans', 'Segoe UI', Tahoma, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eff5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            margin: 0;
        }

        #app {
            width: 100%;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 38px 38px 30px 30px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.25), 0 4px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            margin: 8px auto;
        }

        .header {
            background: #1e2b3c;
            color: white;
            padding: 18px 20px;
            border-bottom: 5px solid #c9a23c;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .app-title {
            font-size: clamp(1.3rem, 6vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-title span {
            background: #c9a23c;
            color: #1e2b3c;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
        }

        .device-badge {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,215,100,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .device-badge i {
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .creator-badge {
            margin-top: 12px;
            font-size: 0.9rem;
            background: #263b4f;
            padding: 8px 14px;
            border-radius: 50px;
            display: inline-block;
            border-right: 3px solid #c9a23c;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            background: #ffffffd6;
            border-bottom: 2px solid #c9a23c60;
            padding: 5px 5px 0;
            gap: 5px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 14px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            font-weight: 600;
            color: #1e3a5f;
            border-radius: 30px 30px 0 0;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 0 auto;
            min-width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-bottom: 3px solid transparent;
            opacity: 0.75;
            pointer-events: auto;
            box-shadow: none;
            outline: none;
        }

        .tab-btn.active {
            background: #fff;
            color: #b8860b;
            border-bottom: 3px solid #c9a23c;
            font-weight: 700;
            opacity: 1;
            box-shadow: 0 -4px 8px rgba(0,0,0,0.02);
        }

        .chapter-content {
            background: #ffffffdd;
            padding: 16px 18px;
            min-height: 50vh;
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            border-radius: 0 0 30px 30px;
        }

        .qa-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03), 0 0 0 1px #eee;
            transition: 0.15s;
            border-right: 6px solid #c9a23c;
        }

        .question {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b2d44;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
        }

        .question::before {
            content: "❓";
            font-size: 1.3rem;
            color: #c49a2b;
        }

        .answer {
            color: #2d3e55;
            font-size: 0.98rem;
            line-height: 1.7;
            background: #f7faff;
            padding: 18px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #e7edf5;
            position: relative;
        }

        .answer p {
            margin-bottom: 12px;
        }

        .share-ayah {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 18px;
            border-top: 1px dashed #c9a23c80;
            padding-top: 14px;
        }

        .btn-icon {
            background: #eef4fa;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e3a5f;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #b0c4de;
            box-shadow: 0 2px 3px rgba(0,0,0,0.05);
            opacity: 0.9;
            pointer-events: auto;
        }

        .btn-icon:active {
            background: #d9e2ef;
            transform: scale(0.97);
        }

        .footer-note {
            background: #1e2b3c;
            color: #b0c6da;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #3f5568;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }

        .footer-note strong {
            color: #f5d97a;
        }

        .no-copy {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
<div id="app" class="no-copy">

    <!-- سربرگ با اطلاعات برنامه و سازنده و دستگاه پویا -->
    <div class="header">
        <div class="header-top">
            <div class="app-title">
                🎓 دانشگاه فرهنگیان <span>مصاحبه و گزینش</span>
            </div>
            <div class="device-badge" id="deviceDisplay">
                <i>🔍</i> <span id="deviceTypeText">تشخیص دستگاه...</span>
            </div>
        </div>
        <div class="creator-badge">
            ✨ ساخته شده توسط <strong>تیم محتوای فرهنگیان</strong> — ویژه‌ی داوطلبان مصاحبه ✨
            <br>📌 بانک سوالات باز و قابل تکمیل توسط شما
        </div>
    </div>

    <!-- تب‌های دسته‌بندی فصل‌ها -->
    <div class="category-tabs" id="tabContainer">
        <button class="tab-btn active" data-chapter="religion">🕌 دینی و مذهبی</button>
        <button class="tab-btn" data-chapter="political">⚖️ عقیدتی سیاسی</button>
        <button class="tab-btn" data-chapter="general">📰 عمومی و روزمره</button>
        <button class="tab-btn" data-chapter="ethics">✨ احادیث و اخلاق</button>
        <button class="tab-btn" data-chapter="random">🔀 سوالات ترکیبی</button>
    </div>

    <!-- بخش نمایش سوالات و جوابها -->
    <div class="chapter-content" id="chapterContent">
        <div style="text-align: center; padding: 50px 0;">در حال بارگذاری...</div>
    </div>

    <!-- فوتر -->
    <div class="footer-note">
        <span>📋 مجموعاً <strong id="totalCount">۰</strong> سوال</span>
        <span>❌ کپی‌برداری غیرممکن است</span>
        <span>📲 نمایش خودکار بر اساس دستگاه</span>
    </div>
</div>

<script>
    (function() {
        // ===============================================================
        // ==============  بانک سوالات - اینجا سوالات خود را اضافه کنید ==============
        // ===============================================================
        
  // دسته‌بندی اول: دینی و مذهبی
const religionQuestions = [
    {
        q: "چرا نماز ستون دین است؟",
        a: "نماز باعث یاد خدا، بازدارندگی از گناه و آرامش دل می‌شود. امام باقر (ع) می‌فرمایند: «نماز ستون دین است؛ اگر قبول شود بقیه اعمال قبول می‌شود.» همچنین در قرآن (عنکبوت، ۴۵) به یاد خدا و نهی از فحشا اشاره شده است. نماز اولین سوالی است که در قیامت از آن می‌پرسند."
    },
    {
        q: "معاد چیست و چرا باور به آن مهم است؟",
        a: "معاد یعنی بازگشت به سوی خدا برای حسابرسی. معاد باعث مسئولیت‌پذیری و عدالت الهی می‌شود. قرآن می‌فرماید: «آیا گمان کردید شما را بیهوده آفریده‌ایم؟» (مؤمنون ۱۱۵). باور به معاد به زندگی معنا می‌بخشد و انسان را از گناه بازمی‌دارد."
    },
    {
        q: "توحید چیست و چه اقسامی دارد؟",
        a: "توحید یعنی یگانه دانستن خدا در ذات، صفات و افعال. اقسام آن: توحید ذاتی (خدا یکی است)، توحید صفاتی (صفات خدا عین ذات اوست)، توحید عبادی (تنها خدا را می‌پرستیم) و توحید افعالی (همه کارها به فرمان خداست)."
    },
    {
        q: "نبوت چیست و چرا به پیامبران نیاز داریم؟",
        a: "نبوت یعنی برگزیدن انسانهایی از سوی خدا برای هدایت مردم. نیاز به پیامبران: ۱- عقل انسان به تنهایی نمی‌تواند همه جزئیات زندگی را تشخیص دهد ۲- نیاز به الگوی عملی ۳- بشارت و انذار مردم ۴- بیان احکام الهی."
    },
    {
        q: "امامت در چه دینی است و چرا شیعیان به آن معتقدند؟",
        a: "امامت جانشینی پیامبر (ص) در رهبری دین و دنیای مسلمانان است. شیعیان معتقدند امامت ادامه نبوت و منصوب از سوی خداست. دلیل: حدیث غدیر، حدیث ثقلین و آیه ولایت. امامان معصوم از خطا و گناه محافظت شده‌اند."
    },
    {
        q: "عدل الهی یعنی چه و چه اهمیتی دارد؟",
        a: "عدل الهی یعنی خداوند عادل است و به هیچ کس ظلم نمی‌کند. اهمیت آن: ۱- نظام هستی بر اساس عدل است ۲- پاداش و کیفر الهی عادلانه است ۳- انسانها مسئول اعمال خود هستند ۴- خداوند بندگان را به عدالت امر کرده است."
    },
    {
        q: "قرآن چند سوره دارد و نام‌های دیگر آن چیست؟",
        a: "قرآن ۱۱۴ سوره دارد. نام‌های دیگر: فرقان (جداکننده حق از باطل)، ذکر (یادآور)، کتاب (نوشته شده)، نور، هدی (هدایت‌گر)، شفا، موعظه، مبارک، مبین و عزیز."
    },
    {
        q: "اولین و آخرین سوره قرآن کدام است؟",
        a: "اولین سوره از نظر ترتیب مصحف، سوره حمد (فاتحة الکتاب) و آخرین سوره، سوره ناس است. اما از نظر نزول، اولین سوره‌های نازل شده، سوره علق و آخرین سوره، سوره نصر یا مائده (به اختلاف نظر) است."
    },
    {
        q: "طولانی‌ترین و کوتاه‌ترین سوره قرآن کدام است؟",
        a: "طولانی‌ترین سوره، سوره بقره (۲۸۶ آیه) و کوتاه‌ترین سوره، سوره کوثر (۳ آیه) است. سوره اخلاص نیز ۴ آیه دارد و از سوره‌های کوتاه قرآن است."
    },
    {
        q: "آیه‌الکرسی در کدام سوره است و چه پیامی دارد؟",
        a: "آیه‌الکرسی آیه ۲۵۵ سوره بقره است. پیام‌های آن: توحید، علم بی‌پایان خدا، قدرت مطلق الهی، وسعت کرسی خدا، عزت و علو خداوند. این آیه برترین آیه قرآن معرفی شده است."

    {
        q: "چند آیه در قرآن وجود دارد؟",

    {
        q: "پیامبر اسلام (ص) در چه سالی و کجا متولد شد؟",
        a: "حضرت محمد (ص) در ۱۷ ربیع‌الاول عام الفیل (۵۷۰ میلادی) در شهر مکه متولد شدند. پدرشان عبدالله و مادرشان آمنه بود. ایشان پیش از تولد پدر را از دست دادند و در ۶ سالگی مادرشان را نیز از دست دادند."
    },
    {
        q: "اولین آیه نازل شده بر پیامبر (ص) کدام است؟",
        a: "اولین آیات نازل شده، آیات ابتدایی سوره علق (اقرأ باسم ربک الذی خلق) است. این آیات در غار حرا توسط جبرئیل بر پیامبر نازل شد و امر به خواندن به نام خداوند کرد."
    },
    {
        q: "معراج پیامبر (ص) چیست و در چه سالی رخ داد؟",
        a: "معراج سفر شبانه پیامبر (ص) از مسجدالحرام به مسجدالاقصی و سپس به آسمان‌ها و ملاقات با انبیا و رسیدن به سدرة المنتهی بود. این رویداد در سال ۶۲۱ میلادی (حدود یک سال پیش از هجرت) رخ داد."
    },
    {
        q: "هجرت پیامبر (ص) از مکه به مدینه در چه سالی بود؟",
        a: "هجرت پیامبر (ص) در سال ۶۲۲ میلادی (۱۳ سال پس از بعثت) رخ داد. این رویداد مبدأ تاریخ هجری قمری شد. پیامبر به همراه ابوبکر به مدینه هجرت کردند و در مسیر در غار ثور پنهان شدند."
    },
    {
        q: "غدیر خم چیست و چه واقعه‌ای در آن رخ داد؟",
        a: "غدیر خم منطقه‌ای بین مکه و مدینه است که پیامبر (ص) در بازگشت از حجة الوداع (۱۸ ذی‌الحجه) در آن توقف کردند و با نصب حضرت علی (ع) به جانشینی خود، آیه «الیوم اکملت لکم دینکم» نازل شد. شیعیان این روز را عید غدیر می‌دانند."
    },
    {
        q: "ائمه معصومین (ع) چند نفر هستند و نامشان چیست؟",

    },
    {
        q: "حضرت مهدی (عج) کیست و چه زمانی ظهور می‌کند؟",

    },
    {
        q: "نمازهای روزانه چند رکعت است و چگونه تقسیم می‌شود؟",
        a: "نمازهای روزانه ۱۷ رکعت است: صبح ۲ رکعت، ظهر ۴ رکعت، عصر ۴ رکعت، مغرب ۳ رکعت، عشا ۴ رکعت. در سفر نمازهای ۴ رکعتی به ۲ رکعت تبدیل می‌شود (نماز قصر)."
    },
    {
        q: "اذان و اقامه چیست و چه تفاوتی دارد؟",
        a: "اذان اعلام وقت نماز با عبارات مخصوص است. اقامه نیز همین عبارات را دارد اما با یک قَد قامت الصلاة اضافه. اقامه برای شروع نماز خوانده می‌شود و مستحب است. تفاوت: اقامه سریع‌تر و با یک تکبیر اضافه در اول و آخر گفته می‌شود."

    {

    },
    {
        q: "مبطلات نماز کدامند؟",
        a: "مبطلات نماز (چیزهایی که نماز را باطل می‌کند): ۱- حدث (بی‌وضو شدن) ۲- روی برگرداندن از قبله ۳- حرف زدن عمدی ۴- خنده و گریه عمدی با صدا ۵- خوردن و آشامیدن ۶- کم یا زیاد کردن عمدی رکن ۷- شک در رکعت‌های نماز دو و سه رکعتی."

            const isTablet = /iPad|Android(?!.*Mobile)|Tablet|KF|Silk/i.test(ua) || (width >= 600 && width <= 1024 && isMobile);

                    const shareText = `${item.q} | ${item.a}`.replace(/'/g, "\\'");
                    html += `<div class="share-ayah">
                        <button class="btn-icon" onclick="window.copyText('${shareText}')">📋 کپی آیه/حدیث</button>
                        <button class="btn-icon" onclick="window.shareText('${shareText}')">📤 اشتراک‌گذاری</button>
                    </div>`;
                }
                
                html += `</div></div>`;
            });
            chapterContent.innerHTML = html;
        }

        // توابع سراسری برای کپی و اشتراک
        window.copyText = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ متن در حافظه کپی شد');
            }).catch(() => {
                alert('کپی با مشکل مواجه شد');
            });
        };

        window.shareText = function(text) {
            if (navigator.share) {
                navigator.share({
                    title: 'دانشگاه فرهنگیان',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text);
                alert('✅ متن کپی شد - می‌توانید در پیامرسان مورد نظر paste کنید');
            }
        };

        // رویداد کلیک تب‌ها
        tabButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                tabButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const chapter = this.dataset.chapter;
                renderChapter(chapter);
            });
        });

        // بارگذاری پیش‌فرض (فصل دینی)
        renderChapter('religion');

        // ممانعت از کپی
        document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
        document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'a' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    })();
</script>
</body>
</html>
