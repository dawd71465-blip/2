<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>دانشگاه فرهنگیان | بانک سوالات مصاحبه و گزینش</title>
    <style>
        /* === RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'IRANSans', 'Segoe UI', Tahoma, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eff5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            margin: 0;
        }

        #app {
            width: 100%;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 38px 38px 30px 30px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.25), 0 4px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            margin: 8px auto;
        }

        .header {
            background: #1e2b3c;
            color: white;
            padding: 18px 20px;
            border-bottom: 5px solid #c9a23c;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .app-title {
            font-size: clamp(1.3rem, 6vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-title span {
            background: #c9a23c;
            color: #1e2b3c;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
        }

        .device-badge {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,215,100,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .device-badge i {
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .creator-badge {
            margin-top: 12px;
            font-size: 0.9rem;
            background: #263b4f;
            padding: 8px 14px;
            border-radius: 50px;
            display: inline-block;
            border-right: 3px solid #c9a23c;
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            background: #ffffffd6;
            border-bottom: 2px solid #c9a23c60;
            padding: 5px 5px 0;
            gap: 5px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 14px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            font-weight: 600;
            color: #1e3a5f;
            border-radius: 30px 30px 0 0;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 0 auto;
            min-width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-bottom: 3px solid transparent;
            opacity: 0.75;
            pointer-events: auto;
            box-shadow: none;
            outline: none;
        }

        .tab-btn.active {
            background: #fff;
            color: #b8860b;
            border-bottom: 3px solid #c9a23c;
            font-weight: 700;
            opacity: 1;
            box-shadow: 0 -4px 8px rgba(0,0,0,0.02);
        }

        .chapter-content {
            background: #ffffffdd;
            padding: 16px 18px;
            min-height: 50vh;
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            border-radius: 0 0 30px 30px;
        }

        .qa-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03), 0 0 0 1px #eee;
            transition: 0.15s;
            border-right: 6px solid #c9a23c;
        }

        .question {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b2d44;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
        }

        .question::before {
            content: "❓";
            font-size: 1.3rem;
            color: #c49a2b;
        }

        .answer {
            color: #2d3e55;
            font-size: 0.98rem;
            line-height: 1.7;
            background: #f7faff;
            padding: 18px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #e7edf5;
            position: relative;
        }

        .answer p {
            margin-bottom: 12px;
        }

        .share-ayah {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 18px;
            border-top: 1px dashed #c9a23c80;
            padding-top: 14px;
        }

        .btn-icon {
            background: #eef4fa;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e3a5f;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #b0c4de;
            box-shadow: 0 2px 3px rgba(0,0,0,0.05);
            opacity: 0.9;
            pointer-events: auto;
        }

        .btn-icon:active {
            background: #d9e2ef;
            transform: scale(0.97);
        }

        .footer-note {
            background: #1e2b3c;
            color: #b0c6da;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #3f5568;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }

        .footer-note strong {
            color: #f5d97a;
        }

        .no-copy {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body>
<div id="app" class="no-copy">

    <!-- سربرگ با اطلاعات برنامه و سازنده و دستگاه پویا -->
    <div class="header">
        <div class="header-top">
            <div class="app-title">
                🎓 دانشگاه فرهنگیان <span>مصاحبه و گزینش</span>
            </div>
            <div class="device-badge" id="deviceDisplay">
                <i>🔍</i> <span id="deviceTypeText">تشخیص دستگاه...</span>
            </div>
        </div>
        <div class="creator-badge">
            ✨ ساخته شده توسط <strong>تیم محتوای فرهنگیان</strong> — ویژه‌ی داوطلبان مصاحبه ✨
            <br>📌 بانک سوالات باز و قابل تکمیل توسط شما
        </div>
    </div>

    <!-- تب‌های دسته‌بندی فصل‌ها -->
    <div class="category-tabs" id="tabContainer">
        <button class="tab-btn active" data-chapter="religion">🕌 دینی و مذهبی</button>
        <button class="tab-btn" data-chapter="political">⚖️ عقیدتی سیاسی</button>
        <button class="tab-btn" data-chapter="general">📰 عمومی و روزمره</button>
        <button class="tab-btn" data-chapter="ethics">✨ احادیث و اخلاق</button>
        <button class="tab-btn" data-chapter="random">🔀 سوالات ترکیبی</button>
    </div>

    <!-- بخش نمایش سوالات و جوابها -->
    <div class="chapter-content" id="chapterContent">
        <div style="text-align: center; padding: 50px 0;">در حال بارگذاری...</div>
    </div>

    <!-- فوتر -->
    <div class="footer-note">
        <span>📋 مجموعاً <strong id="totalCount">۰</strong> سوال</span>
        <span>❌ کپی‌برداری غیرممکن است</span>
        <span>📲 نمایش خودکار بر اساس دستگاه</span>
    </div>
</div>

<script>
    (function() {
        // ===============================================================
        // ==============  بانک سوالات - اینجا سوالات خود را اضافه کنید ==============
        // ===============================================================
        
        // دسته‌بندی اول: دینی و مذهبی
        const religionQuestions = [
            {
                q: "چرا نماز ستون دین است؟",
                a: "نماز باعث یاد خدا، بازدارندگی از گناه و آرامش دل می‌شود. امام باقر (ع) می‌فرمایند: «نماز ستون دین است؛ اگر قبول شود بقیه اعمال قبول می‌شود.» همچنین در قرآن (عنکبوت، ۴۵) به یاد خدا و نهی از فحشا اشاره شده است."
            },
            {
                q: "معاد چیست و چرا باور به آن مهم است؟",
                a: "معاد یعنی بازگشت به سوی خدا برای حسابرسی. معاد باعث مسئولیت‌پذیری و عدالت الهی می‌شود. قرآن می‌فرماید: «آیا گمان کردید شما را بیهوده آفریده‌ایم؟» (مؤمنون ۱۱۵)."
            },
            {
                q: "توضیح مختصر درباره عصمت پیامبران",
                a: "عصمت یعنی دوری از گناه و خطا در دریافت و ابلاغ وحی. دلیل آن لطف خدا و اعتماد مردم است. آیه تطهیر (احزاب ۳۳) بر عصمت اهل بیت دلالت دارد."
            },
            {
                q: "آیه‌الکرسی چه پیامی دارد؟",
                a: "توحید، علم و قدرت بی‌پایان خدا. «الله لا اله الا هو الحی القیوم...» (بقره ۲۵۵). این آیه بر یگانگی، زنده بودن و قیومیت خدا تأکید دارد."
            },
            {
                q: "چرا امامت ادامه نبوت است؟",
                a: "برای هدایت امت پس از پیامبر. حدیث ثقلین: «کتاب الله و عترتی» که پیامبر فرمود: من دو چیز گرانبها در میان شما می‌گذارم: کتاب خدا و خاندانم."
            }
        ];

        // دسته‌بندی دوم: عقیدتی سیاسی
        const politicalQuestions = [
            {
                q: "ولایت فقیه چیست؟",
                a: "نظریه‌ای برای اداره جامعه اسلامی در عصر غیبت به رهبری فقیه جامع‌الشرایط. امام خمینی (ره) آن را احیا کرد و در قانون اساسی جمهوری اسلامی ایران تجلی یافته است."
            },
            {
                q: "مهمترین وظیفه شهروندان در نظام اسلامی چیست؟",
                a: "نظارت همگانی، امر به معروف، وفاداری به قانون و مشارکت سیاسی. همچنین تلاش برای حفظ نظام و دفاع از ارزش‌ها."
            },
            {
                q: "آزادی در قانون اساسی چه حدودی دارد؟",
                a: "تا جایی که به مبانی اسلام و حقوق عمومی لطمه نزند (اصل ۴۰ قانون اساسی). آزادی هنگامی محترم است که علیه نظام و مصالح عمومی نباشد."
            },
            {
                q: "عدالت از دیدگاه امام علی (ع) چیست؟",
                a: "عدالت قرار دادن هر چیز در جای خود. نهج‌البلاغه: «العدل یضع الامور مواضعها». عدالت یعنی رعایت حقوق و انصاف."
            },
            {
                q: "نقش شوراها در تصمیم‌گیری ملی؟",
                a: "مشورت و مشارکت جمعی. قرآن: «و امرهم شوری بینهم» (شوری ۳۸). شوراها باعث همفکری و کاهش خطا در تصمیم‌گیری‌ها می‌شوند."
            }
        ];

        // دسته‌بندی سوم: عمومی و روزمره
        const generalQuestions = [
            {
                q: "جنگ نرم چیست؟",
                a: "تهاجم فرهنگی و رسانه‌ای بدون درگیری نظامی برای تغییر باورها، ارزش‌ها و هویت یک جامعه. هدف آن نفوذ در باورهای مردم است."
            },
            {
                q: "مهمترین چالش جوانان امروز چیست؟",
                a: "اشتغال، ازدواج، هویت‌یابی و فضای مجازی. همچنین بحران معنا و اعتیاد به اینترنت از معضلات جدی است."
            },
            {
                q: "رسانه چه تأثیری بر سبک زندگی دارد؟",
                a: "الگوسازی، تغییر نگرش و ترویج مصرف‌گرایی. رسانه‌ها می‌توانند سبک زندگی اسلامی را ترویج یا تضعیف کنند."
            },
            {
                q: "مهارت‌های لازم معلم آینده؟",
                a: "ارتباط مؤثر، دانش روز، اخلاق حرفه‌ای و تفکر انتقادی. همچنین آشنایی با فناوری‌های آموزشی و روانشناسی کودک."
            },
            {
                q: "هوش مصنوعی چه تأثیری بر آموزش دارد؟",
                a: "شخصی‌سازی یادگیری، دسترسی ۲۴ ساعته به محتوا و کمک به معلم در ارزشیابی. اما نیازمند سواد دیجیتال معلمان است."
            }
        ];

        // دسته‌بندی چهارم: احادیث و اخلاق
        const ethicsQuestions = [
            {
                q: "حدیثی درباره اخلاق نیکو",
                a: "پیامبر (ص): «انما بعثت لاتمم مکارم الاخلاق». (همانا برای اتمام مکارم اخلاق مبعوث شدم). اخلاق نیکو گناهان را می‌زداید."
            },
            {
                q: "آیه ۸ سوره مائده درباره عدالت",
                a: "«یا ایها الذین آمنوا کونوا قوامین لله شهداء بالقسط...» (ای مؤمنان! برای خدا قیام کنید و به عدالت شهادت دهید)."
            },
            {
                q: "تواضع در روایات",
                a: "امام سجاد (ع): «خداوند متواضعان را دوست دارد.» تواضع نشانه ایمان و کبر نشانه جهل است."
            },
            {
                q: "محبت به دیگران",
                a: "پیامبر (ص): «هیچ‌یک از شما مؤمن نیست مگر آنچه برای خود می‌خواهد برای برادرش هم بخواهد.» این اساس اخلاق اجتماعی است."
            },
            {
                q: "حدیثی درباره علم آموزی",
                a: "پیامبر (ص): «طلب العلم فریضة علی کل مسلم». (طلب علم بر هر مسلمانی واجب است)."
            }
        ];

        // دسته‌بندی پنجم: سوالات ترکیبی (نمونه)
        const randomQuestions = [
            {
                q: "چرا در مصاحبه به مسائل روز می‌پردازند؟",
                a: "برای سنجش آگاهی، تحلیل و انطباق با ارزش‌های انقلاب. مصاحبه‌گران می‌خواهند بدانند داوطلب چقدر مسائل روز را رصد می‌کند."
            },
            {
                q: "اقتصاد مقاومتی یعنی چه؟",
                a: "تولید داخلی، کاهش وابستگی، حمایت از کار ایرانی. این مفهوم اولین بار توسط رهبر انقلاب مطرح شد."
            },
            {
                q: "نقش زن در خانواده و جامعه از نگاه اسلام",
                a: "محوریت خانواده و حضور مؤثر اجتماعی با رعایت موازین. زن می‌تواند هم مادر و هم یک کنشگر اجتماعی موفق باشد."
            },
            {
                q: "رابطه توکل و تلاش",
                a: "قرآن می‌فرماید: «و من یتوکل علی الله فهو حسبه» (طلاق ۳) اما باید کار کرد. توکل به معنای دست روی دست گذاشتن نیست."
            },
            {
                q: "فضای مجازی و تهدیدات اخلاقی",
                a: "دسترسی به محتوای نامناسب، شایعه‌پراکنی و کاهش روابط واقعی. نیازمند سواد رسانه‌ای و تقویت باورهای دینی است."
            }
        ];

        // ============== پایان بخش سوالات - بقیه کد را تغییر ندهید ==============
        // ===============================================================

        // تشخیص خودکار دستگاه
        function detectDevice() {
            const ua = navigator.userAgent;
            const width = window.innerWidth;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            const isTablet = /iPad|Android(?!.*Mobile)|Tablet|KF|Silk/i.test(ua) || (width >= 600 && width <= 1024 && isMobile);

            if (isTablet || (width >= 600 && width <= 1024 && isMobile)) return 'tablet';
            if (isMobile || width < 600) return 'mobile';
            return 'desktop';
        }

        const device = detectDevice();
        const deviceSpan = document.getElementById('deviceTypeText');
        if (device === 'mobile') {
            deviceSpan.innerHTML = '📱 گوشی موبایل — نمایش عمودی';
        } else if (device === 'tablet') {
            deviceSpan.innerHTML = '📟 تبلت — نمایش بهینه';
        } else {
            deviceSpan.innerHTML = '💻 لپ‌تاپ/کامپیوتر — فضای کامل';
        }

        // ترکیب همه سوالات در یک بانک اصلی
        const fullQuestionBank = {
            religion: religionQuestions,
            political: politicalQuestions,
            general: generalQuestions,
            ethics: ethicsQuestions,
            random: randomQuestions
        };

        // محاسبه تعداد کل
        let totalCount = 0;
        for (let cat in fullQuestionBank) {
            totalCount += fullQuestionBank[cat].length;
        }
        document.getElementById('totalCount').innerText = totalCount;

        // تابع دریافت سوالات بر اساس فصل
        function getQuestionsByChapter(chapter) {
            return fullQuestionBank[chapter] || [];
        }

        // نمایش فصل فعال
        const chapterContent = document.getElementById('chapterContent');
        const tabButtons = document.querySelectorAll('.tab-btn');

        function renderChapter(chapterId) {
            const qas = getQuestionsByChapter(chapterId);
            if (qas.length === 0) {
                chapterContent.innerHTML = '<div class="qa-item">هنوز سوالی برای این دسته اضافه نشده است.</div>';
                return;
            }

            let html = '';
            qas.forEach((item, idx) => {
                // تشخیص آیات و احادیث برای نمایش دکمه‌های اشتراک
                const isAyahHadith = item.q.includes('حدیث') || item.q.includes('آیه') || chapterId === 'ethics';
                
                html += `<div class="qa-item">
                    <div class="question">${item.q}</div>
                    <div class="answer">
                        <p>${item.a}</p>`;
                
                if (isAyahHadith) {
                    const shareText = `${item.q} | ${item.a}`.replace(/'/g, "\\'");
                    html += `<div class="share-ayah">
                        <button class="btn-icon" onclick="window.copyText('${shareText}')">📋 کپی آیه/حدیث</button>
                        <button class="btn-icon" onclick="window.shareText('${shareText}')">📤 اشتراک‌گذاری</button>
                    </div>`;
                }
                
                html += `</div></div>`;
            });
            chapterContent.innerHTML = html;
        }

        // توابع سراسری برای کپی و اشتراک
        window.copyText = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ متن در حافظه کپی شد');
            }).catch(() => {
                alert('کپی با مشکل مواجه شد');
            });
        };

        window.shareText = function(text) {
            if (navigator.share) {
                navigator.share({
                    title: 'دانشگاه فرهنگیان',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text);
                alert('✅ متن کپی شد - می‌توانید در پیامرسان مورد نظر paste کنید');
            }
        };

        // رویداد کلیک تب‌ها
        tabButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                tabButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const chapter = this.dataset.chapter;
                renderChapter(chapter);
            });
        });

        // بارگذاری پیش‌فرض (فصل دینی)
        renderChapter('religion');

        // ممانعت از کپی
        document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
        document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'a' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    })();
</script>
</body>
</html>
