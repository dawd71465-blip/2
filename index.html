<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
    <title>مسافت‌یاب ایران | محاسبه فاصله شهرها</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif;
        }

        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #1e272e;
            --gold: #f1c40f;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
        }

        .app-container {
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }

        /* کانتینر اصلی */
        .main-card {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 50px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            padding: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-height: 95vh;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .main-card::-webkit-scrollbar {
            display: none;
        }

        /* هدر */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: clamp(1.8em, 6vw, 2.5em);
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 5px;
        }

        .header p {
            color: #7f8c8d;
            font-size: clamp(0.8em, 3vw, 1em);
        }

        /* بخش انتخاب مبدا و مقصد */
        .location-section {
            background: linear-gradient(145deg, #f8faff, #ffffff);
            border-radius: 40px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid var(--secondary);
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.1);
        }

        .location-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .location-icon {
            width: 50px;
            height: 50px;
            border-radius: 25px;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            color: white;
        }

        .location-title {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary);
        }

        /* سلکت باکس‌ها */
        .select-group {
            margin-bottom: 15px;
        }

        .select-label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 600;
            font-size: 1em;
        }

        .custom-select {
            width: 100%;
            padding: 18px 20px;
            border: 3px solid #eef2f7;
            border-radius: 30px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 20px center;
            background-size: 15px;
        }

        .custom-select:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 5px rgba(52, 152, 219, 0.1);
            outline: none;
        }

        .custom-select option {
            padding: 15px;
            font-size: 1em;
        }

        /* دکمه جابجایی */
        .swap-button {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        .swap-btn {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--warning);
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(243, 156, 18, 0.3);
        }

        .swap-btn:hover {
            transform: rotate(180deg) scale(1.1);
        }

        .swap-btn:active {
            transform: rotate(180deg) scale(0.95);
        }

        /* دکمه محاسبه */
        .calculate-btn {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 40px;
            background: linear-gradient(135deg, var(--success), #2ecc71);
            color: white;
            font-size: 1.4em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 15px 30px rgba(46, 204, 113, 0.3);
            margin: 20px 0;
        }

        .calculate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(46, 204, 113, 0.4);
        }

        .calculate-btn:active {
            transform: translateY(0);
        }

        /* کارت نتیجه */
        .result-card {
            background: linear-gradient(145deg, #ffffff, #f8faff);
            border-radius: 40px;
            padding: 25px;
            border: 3px solid var(--success);
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s;
            margin-top: 10px;
        }

        .result-card.show {
            opacity: 1;
            transform: translateY(0);
        }

        .route-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .cities {
            font-size: 1.4em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .distance-main {
            font-size: 3.5em;
            font-weight: 800;
            color: var(--success);
            line-height: 1;
            margin: 15px 0;
        }

        .distance-unit {
            font-size: 0.4em;
            color: #7f8c8d;
        }

        .distance-details {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 30px;
        }

        .detail-item {
            text-align: center;
        }

        .detail-value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--secondary);
        }

        .detail-label {
            font-size: 0.8em;
            color: #7f8c8d;
        }

        /* نقشه ساده */
        .map-preview {
            background: linear-gradient(145deg, #e8f4f8, #d4e9f0);
            border-radius: 30px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .map-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--danger);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            z-index: 2;
        }

        .map-dot.end {
            background: var(--success);
        }

        .map-line {
            flex: 1;
            height: 4px;
            background: linear-gradient(90deg, var(--danger), var(--success));
            margin: 0 10px;
            position: relative;
        }

        .map-distance {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 700;
            color: var(--primary);
            border: 2px solid var(--secondary);
        }

        /* سایر مسیرها */
        .other-routes {
            margin-top: 20px;
        }

        .route-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 25px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .route-item:hover {
            background: var(--secondary);
            color: white;
            transform: translateX(-5px);
        }

        .route-item:hover .route-distance {
            background: white;
            color: var(--primary);
        }

        .route-name {
            font-weight: 600;
        }

        .route-distance {
            background: var(--secondary);
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: 700;
        }

        /* فوتر */
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 0.9em;
        }

        /* حالت بارگذاری */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* هشدار */
        .alert {
            background: #fff3cd;
            color: #856404;
            padding: 15px;
            border-radius: 30px;
            margin: 15px 0;
            display: none;
            border-right: 5px solid var(--warning);
        }

        .alert.show {
            display: block;
        }

        /* تنظیمات اضافی */
        .note {
            background: #e8f4fd;
            border-radius: 20px;
            padding: 15px;
            font-size: 0.9em;
            color: var(--primary);
            margin-top: 15px;
        }

        @media (max-height: 700px) {
            .main-card {
                padding: 15px;
            }
            
            .location-section {
                padding: 15px;
                margin-bottom: 15px;
            }
            
            .calculate-btn {
                padding: 15px;
                margin: 15px 0;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="main-card">
            <!-- هدر -->
            <div class="header">
                <h1>🗺️ مسافت‌یاب ایران</h1>
                <p>محاسبه دقیق فاصله بین شهرهای ایران</p>
            </div>

            <!-- مبدا -->
            <div class="location-section">
                <div class="location-header">
                    <div class="location-icon">📍</div>
                    <div class="location-title">مبدا</div>
                </div>

                <div class="select-group">
                    <label class="select-label">استان مبدا</label>
                    <select class="custom-select" id="originProvince" onchange="updateCities('origin')">
                        <option value="">انتخاب استان</option>
                    </select>
                </div>

                <div class="select-group">
                    <label class="select-label">شهر مبدا</label>
                    <select class="custom-select" id="originCity" disabled>
                        <option value="">ابتدا استان را انتخاب کنید</option>
                    </select>
                </div>
            </div>

            <!-- دکمه جابجایی -->
            <div class="swap-button">
                <button class="swap-btn" onclick="swapLocations()" title="جابجایی مبدا و مقصد">🔄</button>
            </div>

            <!-- مقصد -->
            <div class="location-section">
                <div class="location-header">
                    <div class="location-icon">🎯</div>
                    <div class="location-title">مقصد</div>
                </div>

                <div class="select-group">
                    <label class="select-label">استان مقصد</label>
                    <select class="custom-select" id="destProvince" onchange="updateCities('dest')">
                        <option value="">انتخاب استان</option>
                    </select>
                </div>

                <div class="select-group">
                    <label class="select-label">شهر مقصد</label>
                    <select class="custom-select" id="destCity" disabled>
                        <option value="">ابتدا استان را انتخاب کنید</option>
                    </select>
                </div>
            </div>

            <!-- دکمه محاسبه -->
            <button class="calculate-btn" onclick="calculateDistance()">
                <span>🧮 محاسبه مسافت</span>
            </button>

            <!-- حالت بارگذاری -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">در حال محاسبه...</p>
            </div>

            <!-- هشدار -->
            <div class="alert" id="alert">
                <span id="alertMessage">لطفاً شهر مبدا و مقصد را انتخاب کنید</span>
            </div>

            <!-- کارت نتیجه -->
            <div class="result-card" id="resultCard">
                <div class="route-info">
                    <div class="cities" id="routeCities">تهران → مشهد</div>
                    <div class="distance-main" id="mainDistance">
                        ۰
                        <span class="distance-unit">کیلومتر</span>
                    </div>
                </div>

                <div class="distance-details">
                    <div class="detail-item">
                        <div class="detail-value" id="kmDistance">۰</div>
                        <div class="detail-label">کیلومتر</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-value" id="meterDistance">۰</div>
                        <div class="detail-label">متر</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-value" id="mileDistance">۰</div>
                        <div class="detail-label">مایل</div>
                    </div>
                </div>

                <!-- نقشه ساده -->
                <div class="map-preview">
                    <div class="map-dot">مبدا</div>
                    <div class="map-line">
                        <span class="map-distance" id="mapDistance">۰ km</span>
                    </div>
                    <div class="map-dot end">مقصد</div>
                </div>

                <!-- مسیرهای پیشنهادی -->
                <div class="other-routes">
                    <h3 style="margin-bottom: 15px; color: var(--primary);">🛣️ مسیرهای پیشنهادی</h3>
                    <div id="alternativeRoutes"></div>
                </div>

                <div class="note">
                    <span>⏱️ زمان تقریبی سفر با ماشین: <span id="travelTime">--</span></span>
                </div>
            </div>

            <!-- فوتر -->
            <div class="footer">
                <p>© ۲۰۲۶ - مسافت‌یاب ایران | داده‌های دقیق جغرافیایی</p>
            </div>
        </div>
    </div>

        // ===== پر کردن سلکت باکس‌ها =====
        function populateProvinces() {
            const provinceSelects = ['originProvince', 'destProvince'];
            
            provinceSelects.forEach(selectId => {
                const select = document.getElementById(selectId);
                const provinces = Object.keys(iranData).sort();

                    option.value = province;
                    option.textContent = province;
                    select.appendChild(option);
                });

        // ===== به‌روزرسانی شهرها بر اساس استان انتخاب شده =====
        function updateCities(type) {
            const provinceId = type === 'origin' ? 'originProvince' : 'destProvince';
            const cityId = type === 'origin' ? 'originCity' : 'destCity';
            
            const province = document.getElementById(provinceId).value;
            const citySelect = document.getElementById(cityId);
            
            // پاک کردن گزینه‌های قبلی
            citySelect.innerHTML = '';
            citySelect.disabled = !province;
            
            if (!province) {
                const option = document.createElement('option');
                option.value = '';
                option.textContent = 'ابتدا استان را انتخاب کنید';
                citySelect.appendChild(option);
                return;
            }
            
            // اضافه کردن گزینه پیش‌فرض
            const defaultOption = document.createElement('option');
            defaultOption.value = '';
            defaultOption.textContent = 'انتخاب شهر';
            citySelect.appendChild(defaultOption);
            
            // اضافه کردن شهرها
            const cities = iranData[province] || [];
            cities.sort().forEach(city => {
                const option = document.createElement('option');
                option.value = city;
                option.textContent = city;
                citySelect.appendChild(option);
            });
        }

        // ===== جابجایی مبدا و مقصد =====
        function swapLocations() {
            const originProvince = document.getElementById('originProvince');
            const originCity = document.getElementById('originCity');
            const destProvince = document.getElementById('destProvince');
            const destCity = document.getElementById('destCity');
            
            // ذخیره مقادیر فعلی
            const tempProvince = originProvince.value;
            const tempCity = originCity.value;
            
            // جابجایی
            originProvince.value = destProvince.value;
            originCity.value = destCity.value;
            destProvince.value = tempProvince;
            destCity.value = tempCity;
            
            // به‌روزرسانی سلکت‌ها
            updateCities('origin');
            updateCities('dest');
        }

        // ===== محاسبه فاصله با فرمول Haversine =====
        function calculateDistance() {
            const originCity = document.getElementById('originCity').value;
            const destCity = document.getElementById('destCity').value;
            
            // نمایش بارگذاری
            document.getElementById('loading').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('loading').classList.remove('show');
                
                // اعتبارسنجی
                if (!originCity || !destCity) {
                    document.getElementById('alertMessage').textContent = 'لطفاً شهر مبدا و مقصد را انتخاب کنید';
                    document.getElementById('alert').classList.add('show');
                    setTimeout(() => {
                        document.getElementById('alert').classList.remove('show');
                    }, 3000);
                    return;
                }
                
                if (originCity === destCity) {
                    document.getElementById('alertMessage').textContent = 'شهر مبدا و مقصد نمی‌توانند یکسان باشند';
                    document.getElementById('alert').classList.add('show');
                    setTimeout(() => {
                        document.getElementById('alert').classList.remove('show');
                    }, 3000);
                    return;
                }
                
                // دریافت مختصات
                const originCoord = cityCoordinates[originCity] || getRandomCoordinates();
                const destCoord = cityCoordinates[destCity] || getRandomCoordinates();
                
                // محاسبه فاصله
                const distance = calculateHaversine(originCoord, destCoord);
                
                // نمایش نتیجه
                displayResult(originCity, destCity, distance);
            }, 800);
        }

        // ===== فرمول Haversine برای محاسبه دقیق فاصله =====
        function calculateHaversine(coord1, coord2) {
            const R = 6371; // شعاع زمین بر حسب کیلومتر
            const lat1 = coord1.lat * Math.PI / 180;
            const lat2 = coord2.lat * Math.PI / 180;
            const deltaLat = (coord2.lat - coord1.lat) * Math.PI / 180;
            const deltaLng = (coord2.lng - coord1.lng) * Math.PI / 180;
            
            const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) +
                     Math.cos(lat1) * Math.cos(lat2) *
                     Math.sin(deltaLng/2) * Math.sin(deltaLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            
            return R * c;
        }

        // ===== مختصات تصادفی برای شهرهایی که مختصات ندارند =====
        function getRandomCoordinates() {
            return {
                lat: 32 + Math.random() * 5,
                lng: 51 + Math.random() * 5
            };
        }

        // ===== نمایش نتیجه =====
        function displayResult(origin, dest, distance) {
            const km = Math.round(distance);
            const meters = Math.round(distance * 1000);
            const miles = Math.round(distance * 0.621371);
            
            // به‌روزرسانی مقادیر
            document.getElementById('routeCities').innerHTML = `${origin} → ${dest}`;
            document.getElementById('mainDistance').innerHTML = `${km.toLocaleString()} <span class="distance-unit">کیلومتر</span>`;
            document.getElementById('kmDistance').textContent = km.toLocaleString();
            document.getElementById('meterDistance').textContent = meters.toLocaleString();
            document.getElementById('mileDistance').textContent = miles.toLocaleString();
            document.getElementById('mapDistance').textContent = `${km} km`;
            
            // زمان تقریبی سفر
            const travelHours = Math.round(distance / 80); // میانگین سرعت 80 کیلومتر
            const travelTime = travelHours < 24 ? 
                `${travelHours} ساعت` : 
                `${Math.floor(travelHours / 24)} روز و ${travelHours % 24} ساعت`;
            document.getElementById('travelTime').textContent = travelTime;
            
            // مسیرهای پیشنهادی
            const routes = generateAlternativeRoutes(origin, dest, distance);
            document.getElementById('alternativeRoutes').innerHTML = routes;
            
            // نمایش کارت نتیجه
            document.getElementById('resultCard').classList.add('show');
        }

        // ===== تولید مسیرهای پیشنهادی =====
        function generateAlternativeRoutes(origin, dest, mainDistance) {
            const routes = [
                { name: "مسیر اصلی (آزادراه)", factor: 1 },
                { name: "مسیر کوهستانی (منظره)", factor: 1.3 },
                { name: "مسیر سریع‌تر (کم‌ترافیک)", factor: 0.95 }
            ];
            
            let html = '';
            routes.forEach(route => {
                const dist = Math.round(mainDistance * route.factor);
                html += `
                    <div class="route-item">
                        <span class="route-name">${route.name}</span>
                        <span class="route-distance">${dist} km</span>
                    </div>
                `;
            });
            
            return html;
        }
