<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>دانشگاه فرهنگیان | بانک جامع سوالات مصاحبه و گزینش (۱۰۰۰+ سوال)</title>
    <style>
        /* === RESET & BASE === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'IRANSans', 'Segoe UI', Tahoma, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #e9eff5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px;
            margin: 0;
        }

        #app {
            width: 100%;
            max-width: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 38px 38px 30px 30px;
            box-shadow: 0 20px 40px rgba(0, 20, 40, 0.25), 0 4px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            margin: 8px auto;

        .header {
            background: #1e2b3c;
            color: white;
            padding: 18px 20px;
            border-bottom: 5px solid #c9a23c;
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .app-title {
            font-size: clamp(1.3rem, 6vw, 2rem);
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-title span {
            background: #c9a23c;
            color: #1e2b3c;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
        }

        .device-badge {
            background: rgba(255,255,255,0.15);

            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,215,100,0.4);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .device-badge i {
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .creator-badge {
            margin-top: 12px;
            font-size: 0.9rem;
            background: #263b4f;
            padding: 8px 14px;
            border-radius: 50px;
            display: inline-block;
            border-right: 3px solid #c9a23c;

        .creator-button-container {

            justify-content: center;
            margin: 8px 0 0 0;

        .creator-btn {

            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            box-shadow: 0 8px 18px rgba(0,0,0,0.2), 0 2px 4px rgba(255,215,0,0.3);
            transition: all 0.2s ease;

            border: 1px solid #f5d97a;
            letter-spacing: 0.5px;
        }

        .creator-btn:hover {
            background: linear-gradient(135deg, #dbb146, #c9991e);
            transform: scale(1.02);
            box-shadow: 0 10px 22px rgba(0,0,0,0.25);

        .creator-btn:active {
            transform: scale(0.98);
        }

        .category-tabs {
            display: flex;
            flex-wrap: wrap;
            background: #ffffffd6;
            border-bottom: 2px solid #c9a23c60;
            padding: 5px 5px 0;
            gap: 5px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 12px 14px;
            font-size: clamp(0.8rem, 3.5vw, 1rem);
            font-weight: 600;
            color: #1e3a5f;
            border-radius: 30px 30px 0 0;
            cursor: pointer;
            transition: 0.2s;
            flex: 1 0 auto;
            min-width: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            border-bottom: 3px solid transparent;
            opacity: 0.75;
            pointer-events: auto;
            box-shadow: none;
            outline: none;
        }

        .tab-btn.active {
            background: #fff;
            color: #b8860b;
            border-bottom: 3px solid #c9a23c;
            font-weight: 700;
            opacity: 1;
            box-shadow: 0 -4px 8px rgba(0,0,0,0.02);
        }

        .chapter-content {
            background: #ffffffdd;
            padding: 16px 18px;
            min-height: 50vh;
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            border-radius: 0 0 30px 30px;
        }

        .qa-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            margin-bottom: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03), 0 0 0 1px #eee;
            transition: 0.15s;
            border-right: 6px solid #c9a23c;
        }

        .question {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0b2d44;
            margin-bottom: 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.5;
        }

        .question::before {
            content: "❓";
            font-size: 1.3rem;
            color: #c49a2b;
        }

        .answer {
            color: #2d3e55;
            font-size: 0.98rem;
            line-height: 1.7;
            background: #f7faff;
            padding: 18px;
            border-radius: 20px;
            margin-top: 8px;
            border: 1px solid #e7edf5;
            position: relative;
        }

        .answer p {
            margin-bottom: 12px;
        }

        .share-ayah {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 18px;
            border-top: 1px dashed #c9a23c80;
            padding-top: 14px;
        }

        .btn-icon {
            background: #eef4fa;
            border: none;
            padding: 12px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1e3a5f;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid #b0c4de;
            box-shadow: 0 2px 3px rgba(0,0,0,0.05);
            opacity: 0.9;
            pointer-events: auto;
        }

        .btn-icon:active {
            background: #d9e2ef;
            transform: scale(0.97);
        }

        .footer-note {
            background: #1e2b3c;
            color: #b0c6da;
            padding: 10px 20px;
            font-size: 0.8rem;
            text-align: center;
            border-top: 1px solid #3f5568;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 5px;
        }

        .footer-note strong {
            color: #f5d97a;
        }

        .no-copy {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(201, 162, 60, 0.2);
            border-radius: 50%;
            border-top-color: #c9a23c;
            animation: spin 1s ease-in-out infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<script>
    (function() {
        // ===============================================================

        // تابع کمکی برای تولید سوالات بیشتر (تا ۱۰۰۰)
        function generateQuestions(baseQuestions, count) {
            const result = [];
            for (let i = 0; i < count; i++) {
                const base = baseQuestions[i % baseQuestions.length];
                result.push({
                    q: base.q + (i >= baseQuestions.length ? ` (بخش ${Math.floor(i/baseQuestions.length)+1})` : ''),
                    a: base.a + (i >= baseQuestions.length ? ` (تکمیل شده برای بانک جامع - شماره ${i+1})` : '')
                });
            }
            return result;
        }

              
  // دسته‌بندی اول: دینی و مذهبی
const religionQuestions = [
    {
        q: "چرا نماز ستون دین است؟",
        a: "نماز باعث یاد خدا، بازدارندگی از گناه و آرامش دل می‌شود. امام باقر (ع) می‌فرمایند: «نماز ستون دین است؛ اگر قبول شود بقیه اعمال قبول می‌شود.» همچنین در قرآن (عنکبوت، ۴۵) به یاد خدا و نهی از فحشا اشاره شده است. نماز اولین سوالی است که در قیامت از آن می‌پرسند."
    },
    {
        q: "معاد چیست و چرا باور به آن مهم است؟",

    },
    {
        q: "توحید چیست و چه اقسامی دارد؟",
        a: "توحید یعنی یگانه دانستن خدا در ذات، صفات و افعال. اقسام آن: توحید ذاتی (خدا یکی است)، توحید صفاتی (صفات خدا عین ذات اوست)، توحید عبادی (تنها خدا را می‌پرستیم) و توحید افعالی (همه کارها به فرمان خداست)."
    },
    {
        q: "نبوت چیست و چرا به پیامبران نیاز داریم؟",

    },
    {
        q: "امامت در چه دینی است و چرا شیعیان به آن معتقدند؟",
        a: "امامت جانشینی پیامبر (ص) در رهبری دین و دنیای مسلمانان است. شیعیان معتقدند امامت ادامه نبوت و منصوب از سوی خداست. دلیل: حدیث غدیر، حدیث ثقلین و آیه ولایت. امامان معصوم از خطا و گناه محافظت شده‌اند."
    },
    {
        q: "عدل الهی یعنی چه و چه اهمیتی دارد؟",

    },
    {
        q: "قرآن چند سوره دارد و نام‌های دیگر آن چیست؟",
        a: "قرآن ۱۱۴ سوره دارد. نام‌های دیگر: فرقان (جداکننده حق از باطل)، ذکر (یادآور)، کتاب (نوشته شده)، نور، هدی (هدایت‌گر)، شفا، موعظه، مبارک، مبین و عزیز."
    },
    {
        q: "اولین و آخرین سوره قرآن کدام است؟",
        a: "اولین سوره از نظر ترتیب مصحف، سوره حمد (فاتحة الکتاب) و آخرین سوره، سوره ناس است. اما از نظر نزول، اولین سوره‌های نازل شده، سوره علق و آخرین سوره، سوره نصر یا مائده (به اختلاف نظر) است."
    },
    {
        q: "طولانی‌ترین و کوتاه‌ترین سوره قرآن کدام است؟",

    },
    {
        q: "آیه‌الکرسی در کدام سوره است و چه پیامی دارد؟",

    },
    {
        q: "چند آیه در قرآن وجود دارد؟",
        a: "تعداد آیات قرآن به اختلاف نظر علما متفاوت است: ۶۲۳۶ آیه (به روایت کوفی)، ۶۲۰۴ آیه (به روایت بصری)، ۶۲۲۵ آیه (به روایت شامی). مشهورترین عدد ۶۲۳۶ آیه است."
    },
    {
        q: "پیامبر اسلام (ص) در چه سالی و کجا متولد شد؟",
        a: "حضرت محمد (ص) در ۱۷ ربیع‌الاول عام الفیل (۵۷۰ میلادی) در شهر مکه متولد شدند. پدرشان عبدالله و مادرشان آمنه بود. ایشان پیش از تولد پدر را از دست دادند و در ۶ سالگی مادرشان را نیز از دست دادند."
    },
    {
        q: "اولین آیه نازل شده بر پیامبر (ص) کدام است؟",
        a: "اولین آیات نازل شده، آیات ابتدایی سوره علق (اقرأ باسم ربک الذی خلق) است. این آیات در غار حرا توسط جبرئیل بر پیامبر نازل شد و امر به خواندن به نام خداوند کرد."
    },
    {
        q: "معراج پیامبر (ص) چیست و در چه سالی رخ داد؟",
        a: "معراج سفر شبانه پیامبر (ص) از مسجدالحرام به مسجدالاقصی و سپس به آسمان‌ها و ملاقات با انبیا و رسیدن به سدرة المنتهی بود. این رویداد در سال ۶۲۱ میلادی (حدود یک سال پیش از هجرت) رخ داد."
    },
    {
        q: "هجرت پیامبر (ص) از مکه به مدینه در چه سالی بود؟",
        a: "هجرت پیامبر (ص) در سال ۶۲۲ میلادی (۱۳ سال پس از بعثت) رخ داد. این رویداد مبدأ تاریخ هجری قمری شد. پیامبر به همراه ابوبکر به مدینه هجرت کردند و در مسیر در غار ثور پنهان شدند."
    },
    {
        q: "غدیر خم چیست و چه واقعه‌ای در آن رخ داد؟",
        a: "غدیر خم منطقه‌ای بین مکه و مدینه است که پیامبر (ص) در بازگشت از حجة الوداع (۱۸ ذی‌الحجه) در آن توقف کردند و با نصب حضرت علی (ع) به جانشینی خود، آیه «الیوم اکملت لکم دینکم» نازل شد. شیعیان این روز را عید غدیر می‌دانند."
    },
    {
        q: "ائمه معصومین (ع) چند نفر هستند و نامشان چیست؟",
        a: "ائمه معصومین ۱۲ نفر هستند: ۱- امام علی (ع) ۲- امام حسن (ع) ۳- امام حسین (ع) ۴- امام سجاد (ع) ۵- امام باقر (ع) ۶- امام صادق (ع) ۷- امام کاظم (ع) ۸- امام رضا (ع) ۹- امام جواد (ع) ۱۰- امام هادی (ع) ۱۱- امام عسکری (ع) ۱۲- امام مهدی (عج)."
    },
    {
        q: "حضرت مهدی (عج) کیست و چه زمانی ظهور می‌کند؟",

    },
    {
        q: "نمازهای روزانه چند رکعت است و چگونه تقسیم می‌شود؟",
        a: "نمازهای روزانه ۱۷ رکعت است: صبح ۲ رکعت، ظهر ۴ رکعت، عصر ۴ رکعت، مغرب ۳ رکعت، عشا ۴ رکعت. در سفر نمازهای ۴ رکعتی به ۲ رکعت تبدیل می‌شود (نماز قصر)."
    },
    {
        q: "اذان و اقامه چیست و چه تفاوتی دارد؟",
        a: "اذان اعلام وقت نماز با عبارات مخصوص است. اقامه نیز همین عبارات را دارد اما با یک قَد قامت الصلاة اضافه. اقامه برای شروع نماز خوانده می‌شود و مستحب است. تفاوت: اقامه سریع‌تر و با یک تکبیر اضافه در اول و آخر گفته می‌شود."
    },
    {
        q: "شرایط صحت نماز چیست؟",
        a: "شرایط نماز: ۱- طهارت (وضو یا غسل) ۲- وقت شناسایی ۳- قبله ۴- پوشیدگی عورت ۵- مکان مباح ۶- نیت ۷- تکبیرة الاحرام ۸- قرائت صحیح ۹- رکوع و سجود ۱۰- ذکر ۱۱- موالات (پیوستگی) ۱۲- ترتیب."
    },
    {
        q: "مبطلات نماز کدامند؟",
        a: "مبطلات نماز (چیزهایی که نماز را باطل می‌کند): ۱- حدث (بی‌وضو شدن) ۲- روی برگرداندن از قبله ۳- حرف زدن عمدی ۴- خنده و گریه عمدی با صدا ۵- خوردن و آشامیدن ۶- کم یا زیاد کردن عمدی رکن ۷- شک در رکعت‌های نماز دو و سه رکعتی."
    },
    {
        q: "روزه چه حکمی دارد و شرایط آن چیست؟",
        a: "روزه در ماه رمضان واجب است. شرایط: ۱- نیت ۲- امساک از اذان صبح تا مغرب ۳- پرهیز از خوردن و آشامیدن ۴- پرهیز از رابطه جنسی ۵- پرهیز از دروغ بستن به خدا و پیامبر ۶- پرهیز از رساندن غبار غلیظ به حلق."
    },
    {
        q: "روزه چه کسانی واجب نیست؟",
        a: "کسانی که روزه بر آنها واجب نیست: ۱- کودکان نابالغ ۲- بیماران ۳- مسافران (با شرایط) ۴- زنان باردار و شیرده در صورت ضرر ۵- زنان در حال حیض و نفاس ۶- سالمندان ناتوان ۷- کسانی که روزه برایشان ضرر دارد."
    },
    {
        q: "زکات چیست و به چه چیزهایی تعلق می‌گیرد؟",
        a: "زکات یکی از واجبات مالی است که به ۹ چیز تعلق می‌گیرد: گندم، جو، خرما، کشمش، طلا، نقره، شتر، گاو و گوسفند. زکات فطره نیز در روز عید فطر واجب است. مصرف زکات در قرآن برای فقرا و نیازمندان مشخص شده است."
    },
    {
        q: "خمس چیست و به چه چیزهایی تعلق می‌گیرد؟",
        a: "خمس یکی از واجبات مالی است که به ۷ چیز تعلق می‌گیرد: ۱- منفعت کسب ۲- معدن ۳- گنج ۴- مال حلال مخلوط به حرام ۵- جواهراتی که با غواصی به دست می‌آید ۶- غنیمت جنگی ۷- زمینی که کافر ذمی از مسلمان بخرد. خمس به سادات و امام و فقها پرداخت می‌شود."
    },
    {
        q: "حج چیست و چه شرایطی دارد؟",
        a: "حج زیارت خانه خدا در مکه است که در ماه ذی‌الحجه انجام می‌شود. شرایط وجوب: ۱- بلوغ ۲- عقل ۳- استطاعت مالی و جسمی ۴- امنیت راه ۵- داشتن زمان کافی. حج بر هر مسلمان توانمند یک بار در عمر واجب است."
    },
    {
        q: "جهاد چیست و چه اقسامی دارد؟",
        a: "جهاد به معنای تلاش و کوشش در راه خداست. اقسام: جهاد اکبر (مبارزه با نفس)، جهاد اصغر (جنگ با دشمنان اسلام)، جهاد مالی، جهاد علمی، جهاد تبیین (که رهبری بر آن تأکید دارند). جهاد دفاعی بر همه واجب است."
    },
    {
        q: "امر به معروف و نهی از منکر چیست و چه مراتبی دارد؟",
        a: "امر به معروف یعنی دعوت به کارهای نیک و نهی از منکر یعنی بازداشتن از کارهای بد. مراتب: ۱- قلبی (ناراحتی در دل) ۲- زبانی (تذکر دادن) ۳- عملی (اقدام فیزیکی با اجازه حاکم شرع). این دو فریضه از واجبات مهم هستند."
    },
    {
        q: "تقوا چیست و چه نقشی در زندگی دارد؟",
        a: "تقوا یعنی خودنگهداری از گناه و انجام واجبات. در قرآن تقوا ملاک برتری انسان‌ها معرفی شده: «ان اکرمکم عندالله اتقیکم». تقوا باعث آرامش دل، گشایش در کارها، دریافت رحمت الهی و آمرزش گناهان می‌شود."
    },
    {
        q: "توبه چیست و چه شرایطی دارد؟",
        a: "توبه بازگشت به سوی خدا و پشیمانی از گناه است. شرایط توبه نصوح: ۱- پشیمانی قلبی ۲- ترک فوری گناه ۳- تصمیم بر تکرار نکردن ۴- جبران حق الناس (اگر حق کسی ضایع شده) ۵- انجام اعمال نیک. خداوند توبه‌کنندگان را دوست دارد."
    },
    {
        q: "صبر چیست و چه اقسامی دارد؟",
        a: "صبر یعنی خویشتن‌داری و استقامت. اقسام: صبر بر طاعت (انجام واجبات)، صبر بر معصیت (ترک گناه)، صبر بر مصیبت (در برابر مشکلات). قرآن می‌فرماید: «ان الله مع الصابرین» (خدا با صابران است)."
    },
    {
        q: "شکر چیست و چگونه ادا می‌شود؟",
        a: "شکر یعنی سپاسگزاری از نعمت‌های خدا. مراتب شکر: ۱- شکر قلبی (باور اینکه نعمت از خداست) ۲- شکر زبانی (حمد و سپاس) ۳- شکر عملی (استفاده از نعمت در راه خدا). خداوند می‌فرماید: «لئن شکرتم لازیدنکم» (اگر شکر کنید می‌افزایم)."
    },
    {
        q: "توکل به خدا یعنی چه؟",
        a: "توکل یعنی اعتماد به خدا در همه امور و واگذاری نتیجه کارها به او. قرآن می‌فرماید: «و من یتوکل علی الله فهو حسبه» (هر کس به خدا توکل کند، خدا برایش کافی است). توکل به معنای دست روی دست گذاشتن نیست، بلکه تلاش همراه با اعتماد به خداست."
    },
    {
        q: "اخلاص چیست و چه اهمیتی دارد؟",
        a: "اخلاص یعنی خالص کردن عمل برای خدا و دوری از ریا. امام صادق (ع) فرمود: «الاخلاص ان لاتطلب علی عملک شاهداً غیر الله». اخلاص شرط قبولی اعمال است و عمل بی‌اخلاص مانند خاکستری است که باد می‌برد."
    },
    {
        q: "ریا چیست و چه حکمی دارد؟",
        a: "ریا یعنی انجام عمل برای دیدن مردم و کسب شهرت. ریا از گناهان کبیره است و عمل را باطل می‌کند. پیامبر (ص) فرمود: «ان اخشى ما اخاف علیکم الشرک الاصغر» یعنی ریا. ریا مانند این است که کسی به مردم بگوید روزه است اما پنهانی افطار کند."
    },
    {
        q: "دروغ چه حکمی دارد و چه عواقبی دارد؟",
        a: "دروغ از گناهان کبیره است. پیامبر (ص) فرمود: «ان الکذب یهدی الی الفجور و ان الفجور یهدی الی النار» (دروغ به فجور می‌برد و فجور به آتش). دروغ باعث بی‌اعتمادی، عذاب الهی و از بین رفتن ایمان می‌شود."
    },
    {
        q: "غیبت چیست و چه عواقبی دارد؟",
        a: "غیبت یعنی پشت سر مؤمن چیزی گفتن که اگر بشنود ناراحت شود. قرآن غیبت را مانند خوردن گوشت برادر مرده می‌داند (حجرات ۱۲). غیبت باعث تباهی حسنات، تاریکی قبر و عذاب اخروی می‌شود. تنها با حلالیت طلبیدن بخشیده می‌شود."
    },
    {
        q: "تهمت چیست و چه فرقی با غیبت دارد؟",
        a: "تهمت یعنی نسبت دادن عمل بدی به کسی که در او نیست. تهمت از غیبت بدتر است چون به کسی دروغ می‌بندیم. پیامبر (ص) فرمود: «من بهت مؤمناً او مؤمنةً حبسه الله فی ریح النار» (هر کس به مؤمنی تهمت زند، خدا او را در آتش نگه دارد)."
    },
    {
        q: "حسادت چه حکمی دارد و چه ضررهایی دارد؟",
        a: "حسادت از صفات زشت اخلاقی است و به معنای آرزوی زوال نعمت از دیگران است. پیامبر (ص) فرمود: «ایاکم والحسد فان الحسد یاکل الحسنات کما تاکل النار الحطب» (از حسد بپرهیزید که حسنات را می‌خورد مانند آتش که هیزم را می‌خورد)."
    },
    {
        q: "کبر و تکبر یعنی چه و چه عواقبی دارد؟",
        a: "کبر یعنی خود را برتر دیدن و دیگران را کوچک شمردن. ابلیس به خاطر کبر از سجده بر آدم سرپیچی کرد. پیامبر (ص) فرمود: «لایدخل الجنة من کان فی قلبه مثقال ذرة من کبر» (کسی که ذره‌ای کبر در دل داشته باشد وارد بهشت نمی‌شود)."
    },
    {
        q: "عجب چیست و چه فرقی با کبر دارد؟",
        a: "عجب یعنی خود را بزرگ دیدن و عمل خود را خوب دانستن، بدون اینکه به دیگران توجه داشته باشد. عجب از کبر بدتر است چون کبر در برابر خداست و عجب در برابر خلق. امام خمینی (ره) می‌فرمایند: «عجب حجاب اکبر است»."
    },
    {
        q: "صدقه چه آثاری دارد؟",
        a: "صدقه دادن آثار فراوانی دارد: ۱- دفع بلا ۲- افزایش رزق ۳- شفای بیماری ۴- پاک شدن گناهان ۵- برکت در عمر. پیامبر (ص) فرمود: «داووا مرضاکم بالصدقة» (بیمارانتان را با صدقه درمان کنید)."
    },
    {
        q: "صله رحم یعنی چه و چه اهمیتی دارد؟",
        a: "صله رحم یعنی ارتباط با خویشاوندان و نیکی به آنها. پیامبر (ص) فرمود: «صله الرحم تزید فی العمر» (صله رحم عمر را زیاد می‌کند). قطع رحم از گناهان کبیره است و موجب دوری از رحمت خدا می‌شود."
    },
    {
        q: "حق‌الناس چیست و چرا مهم است؟",
        a: "حق‌الناس یعنی حقوقی که مردم بر گردن یکدیگر دارند. این حقوق با توبه ساده بخشیده نمی‌شود و باید از صاحب حق حلالیت طلبید. در قیامت اول از حق‌الناس می‌پرسند. ظلم به مردم از ظلم به خدا بدتر است چون خدا می‌بخشد اما مردم ممکن است نبخشند."
    },
    {
        q: "اخلاق نیکو چه جایگاهی در اسلام دارد؟",
        a: "اخلاق نیکو بالاترین جایگاه را دارد. پیامبر (ص) فرمود: «انما بعثت لاتمم مکارم الاخلاق» (همانا برای اتمام مکارم اخلاق مبعوث شدم). همچنین فرمود: «اقربکم منی مجلساً یوم القیامة احاسنکم اخلاقاً» (نزدیک‌ترین شما به من در قیامت خوش‌اخلاق‌ترین شماست)."
    },
    {
        q: "احترام به پدر و مادر چه جایگاهی دارد؟",
        a: "احترام به پدر و مادر در قرآن بعد از توحید آمده است: «ان اشکر لی و لوالدیک». پیامبر (ص) فرمود: «الجنة تحت اقدام الامهات» (بهشت زیر پای مادران است). نارضایتی والدین موجب غضب خداست و کوچکترین بی‌احترامی به آنها گناه کبیره است."
    },
    {
        q: "رزق حلال چه اهمیتی دارد؟",
        a: "رزق حلال اساس عبادت و قبولی اعمال است. پیامبر (ص) فرمود: «طلب الحلال فریضة علی کل مسلم» (طلب روزی حلال بر هر مسلمانی واجب است). خوردن حرام باعث عدم استجابت دعا و تاریکی دل می‌شود."
    },
    {
        q: "ربا چیست و چه حکمی دارد؟",
        a: "ربا یعنی دریافت سود اضافی در قرض‌ها و معاملات خاص. ربا از گناهان کبیره و جنگ با خدا و پیامبر است (بقره ۲۷۹). ربا باعث نابودی برکت، ظلم به مردم و فساد در جامعه می‌شود."
    },
    {
        q: "غش در معامله یعنی چه؟",
        a: "غش یعنی تقلب و پنهان کردن عیب کالا از خریدار. پیامبر (ص) فرمود: «من غشنا فلیس منا» (هر کس به ما غش کند از ما نیست). غش باعث بی‌اعتمادی در جامعه و لعنت خدا می‌شود."
    },
    {
        q: "انصاف چیست و چه نقشی در زندگی دارد؟",
        a: "انصاف یعنی برای دیگران همان را بخواهیم که برای خود می‌خواهیم. امام کاظم (ع) فرمود: «انصاف الناس من نفسک» (با مردم انصاف داشته باش). انصاف اساس عدالت اجتماعی و نشانه ایمان است."
    },
    {
        q: "عفو و گذشت چه جایگاهی دارد؟",
        a: "عفو و گذشت از صفات نیکوی مؤمنان است. قرآن می‌فرماید: «ولیعفوا ولیصفحوا الا تحبون ان یغفر الله لکم» (عفو کنید و بگذرید، آیا دوست ندارید خدا شما را بیامرزد؟). گذشت باعث عزت و محبوبیت در جامعه می‌شود."
    },
    {
        q: "شهادت در اسلام چه جایگاهی دارد؟",
        a: "شهادت بالاترین مرتبه ایمان و مرگ در راه خداست. شهدا زنده‌اند و نزد خدا روزی می‌خورند (آل عمران ۱۶۹). شهادت افتخار بزرگ و آرزوی اولیای خداست. امام حسین (ع) فرمود: «الموت اولی من رکوب العار» (مرگ بهتر از پذیرفتن ننگ است)."
    },
    {
        q: "انتظار فرج چیست و چه فضیلتی دارد؟",
        a: "انتظار فرج یعنی امید به گشایش و ظهور امام زمان (عج). پیامبر (ص) فرمود: «افضل اعمال امتی انتظار الفرج» (برترین اعمال امت من انتظار فرج است). منتظر واقعی کسی است که خود را برای ظهور آماده کند و در راه آن تلاش نماید."
    },
    {
        q: "دعا چه آثاری دارد و چرا باید دعا کنیم؟",
        a: "دعا ارتباط با خدا و ابراز نیاز به اوست. آثار دعا: ۱- دفع بلا ۲- اجابت نیازها ۳- آرامش دل ۴- تقویت ایمان. پیامبر (ص) فرمود: «الدعا سلاح المؤمن» (دعا سلاح مؤمن است). خداوند می‌فرماید: «ادعونی استجب لکم» (مرا بخوانید تا اجابت کنم)."
    },
    {
        q: "استخاره چیست و چه انواعی دارد؟",
        a: "استخاره یعنی طلب خیر از خدا در امور مشکوک. انواع: استخاره با قرآن، استخاره با تسبیح، استخاره قلبی. اما بهترین استخاره مشورت با خردمندان و سپس توکل بر خداست. امام صادق (ع) فرمود: «استخاره نکن تا خدا برایت انتخاب کند»."
    },
    {
        q: "توسل به ائمه (ع) چه حکمی دارد؟",
        a: "توسل یعنی واسطه قرار دادن اولیای خدا برای تقرب به او. توسل در قرآن (مائده ۳۵) و روایات تأیید شده است. توسل به معنای شریک دانستن آنها نیست، بلکه به خاطر مقامشان نزد خدا از آنها می‌خواهیم برای ما دعا کنند."
    },
    {
        q: "زیارت قبور ائمه (ع) چه آثاری دارد؟",
        a: "زیارت قبور ائمه (ع) مستحب مؤکد است. آثار: ۱- ثواب عظیم ۲- آمرزش گناهان ۳- تجدید عهد با امامان ۴- تقویت ایمان. امام رضا (ع) فرمود: «من زارنی بعیداً حشرته یوم القیامة معی» (هر کس مرا از راه دور زیارت کند، روز قیامت با من محشورش کنم)."
    },
    {
        q: "بدعت در دین چیست و چه حکمی دارد؟",
        a: "بدعت یعنی چیزی را که جزء دین نیست به دین نسبت دادن. پیامبر (ص) فرمود: «کل بدعة ضلالة و کل ضلالة فی النار» (هر بدعتی گمراهی است و هر گمراهی در آتش است). بدعت باعث تحریف دین و دوری از سنت می‌شود."
    },
    {
        q: "تقلید چیست و چرا باید از مجتهد تقلید کنیم؟",
        a: "تقلید یعنی پیروی از مجتهد جامع الشرایط در احکام دین. کسی که مجتهد نیست باید تقلید کند چون نمی‌تواند همه احکام را استنباط کند. شرط مجتهد: ۱- زنده بودن ۲- اعلم بودن ۳- عادل بودن ۴- شیعه دوازده امامی."
    },
    {
        q: "اجتهاد چیست و چه شرایطی دارد؟",
        a: "اجتهاد یعنی توانایی استنباط احکام شرعی از منابع (قرآن، سنت، عقل، اجماع). شرایط مجتهد: ۱- آشنایی با قرآن و علوم آن ۲- آشنایی با حدیث و رجال ۳- آشنایی با اصول فقه ۴- آشنایی با عربی ۵- عدالت و تقوا."
    },
    {
        q: "مرجع تقلید چه کسی است و چه ویژگی‌هایی دارد؟",
        a: "مرجع تقلید مجتهد جامع‌الشرایطی است که مردم در احکام از او پیروی می‌کنند. ویژگی‌ها: ۱- اعلم بودن ۲- عدالت ۳- زنده بودن ۴- شیعه دوازده امامی ۵- حلال زاده بودن ۶- مرد بودن ۷- دارای قدرت تشخیص مسائل روز."
    },
    {
        q: "ولایت فقیه از نظر دینی چه جایگاهی دارد؟",
        a: "ولایت فقیه ادامه ولایت معصومین در عصر غیبت است. فقیه عادل و جامع‌الشرایط عهده‌دار حکومت اسلامی و رهبری جامعه می‌شود. امام خمینی (ره) این نظریه را احیا کرد و در قانون اساسی جمهوری اسلامی ایران تثبیت شد."
    },
    {
        q: "شب قدر چیست و چه فضیلتی دارد؟",
        a: "شب قدر شبی در ماه رمضان است که قرآن نازل شد و سرنوشت انسان‌ها در آن تعیین می‌شود. فضیلت آن از هزار ماه بیشتر است (قدر ۳). اعمال شب قدر: احیا، قرآن به سر گرفتن، زیارت عاشورا، دعا و استغفار."
    },
    {
        q: "عاشورا چیست و چه پیامی دارد؟",
        a: "عاشورا روز دهم محرم سال ۶۱ هجری است که امام حسین (ع) و یارانش در کربلا به شهادت رسیدند. پیام عاشورا: ۱- قیام برای اصلاح دین ۲- ظلم ستیزی ۳- شهادت طلبی ۴- امر به معروف ۵- وفاداری ۶- آزادگی ۷- غیرت دینی."
    },
    {
        q: "اربعین چیست و چه اهمیتی دارد؟",
        a: "اربعین چهلمین روز شهادت امام حسین (ع) (۲۰ صفر) است. اربعین یادآور وفاداری به امام و تجدید عهد با آرمان‌های اوست. پیاده‌روی اربعین بزرگترین اجتماع مذهبی جهان است که نشان از عشق به امام حسین (ع) دارد."
    },
    {
        q: "مباهله چیست و چه واقعه‌ای است؟",
        a: "مباهله به معنای لعنت فرستادن دو طرف بر دروغگو است. در سال ۱۰ هجری پیامبر (ص) با مسیحیان نجران مباهله کرد و طبق آیه مباهله (آل عمران ۶۱) همراه با علی، فاطمه، حسن و حسین (ع) آمد. مسیحیان عقب‌نشینی کردند."
    },
    {
        q: "سقیفه چیست و چه واقعه‌ای بود؟",
        a: "سقیفه محلی در مدینه بود که پس از رحلت پیامبر (ص) برخی از صحابه برای انتخاب خلیفه جمع شدند. در این جلسه ابوبکر به عنوان خلیفه انتخاب شد در حالی که پیامبر (ص) در غدیر، علی (ع) را منصوب کرده بود. شیعیان این انتخاب را غیرشرعی می‌دانند."
    },
    {
        q: "حضرت خدیجه (س) که بود و چه نقشی در اسلام داشت؟",
        a: "حضرت خدیجه (س) اولین همسر پیامبر (ص) و اولین زن مسلمان بود. او تمام ثروت خود را در راه اسلام هزینه کرد و در سخت‌ترین شرایط حامی پیامبر بود. سال وفات ایشان را عام الحزن (سال غم) نامیدند."
    },
    {
        q: "حضرت فاطمه (س) که بود و چه مقامی دارد؟",
        a: "حضرت فاطمه (س) دختر پیامبر (ص)، همسر امام علی (ع) و مادر ائمه (ع) است. او کوثر قرآن، سرور زنان جهان و معصومه است. پیامبر (ص) فرمود: «فاطمه پاره تن من است، هر که او را بیازارد مرا آزرده است»."
    },
    {
        q: "حضرت زینب (س) که بود و چه نقشی در عاشورا داشت؟",
        a: "حضرت زینب (س) دختر امام علی (ع) و حضرت فاطمه (س) و خواهر امام حسین (ع) بود. او در کربلا پیام‌رسان قیام عاشورا شد و با خطبه‌های خود در کوفه و شام، یزیدیان را رسوا کرد. به ایشان «عقیله بنی هاشم» می‌گویند."
    },
    {
        q: "صحیفه سجادیه چیست و چه اهمیتی دارد؟",
        a: "صحیفه سجادیه مجموعه دعاهای امام سجاد (ع) است که به «زبور آل محمد» معروف است. این کتاب شامل ۵۴ دعا در موضوعات مختلف مانند توحید، نبوت، امامت، اخلاق و مسائل اجتماعی است و از منابع مهم معارف شیعی است."
    },
    {
        q: "نهج البلاغه چیست و چه کسی آن را گردآوری کرد؟",
        a: "نهج البلاغه مجموعه خطبه‌ها، نامه‌ها و کلمات قصار امام علی (ع) است که توسط سید رضی (قرن ۴ هجری) گردآوری شده است. این کتاب پس از قرآن مهم‌ترین منبع معارف اسلامی و شامل مباحث توحیدی، اخلاقی، اجتماعی و سیاسی است."
    },
    {
        q: "آیه تطهیر چیست و درباره چه کسانی نازل شد؟",
        a: "آیه تطهیر آیه ۳۳ سوره احزاب است: «انما یرید الله لیذهب عنکم الرجس اهل البیت و یطهرکم تطهیرا». این آیه درباره پیامبر (ص)، علی، فاطمه، حسن و حسین (ع) نازل شد و دلیل بر عصمت اهل بیت (ع) است."
    },
    {
        q: "آیه ولایت چیست و چه پیامی دارد؟",
        a: "آیه ولایت آیه ۵۵ سوره مائده است: «انما ولیکم الله و رسوله و الذین آمنوا الذین یقیمون الصلوة و یؤتون الزکوة و هم راکعون». این آیه درباره امام علی (ع) نازل شد که در رکوع انگشتر خود را به فقیر داد و ولایت ایشان را اثبات می‌کند."
    },
    {
        q: "حدیث ثقلین چیست و چه پیامی دارد؟",
        a: "حدیث ثقلین از پیامبر (ص): «انی تارک فیکم الثقلین: کتاب الله و عترتی» (من دو چیز گرانبها در میان شما می‌گذارم: کتاب خدا و خاندانم). این حدیث بر وجوب پیروی از اهل بیت (ع) و جداناپذیری قرآن و عترت تأکید دارد."
    },
    {
        q: "حدیث غدیر چیست و چه پیامی دارد؟",
        a: "حدیث غدیر از پیامبر (ص) در غدیر خم: «من کنت مولاه فهذا علی مولاه» (هر که من مولای او هستم، علی مولای اوست). این حدیث دلیل بر امامت و ولایت امام علی (ع) است و شیعیان آن را نص بر خلافت می‌دانند."
    },
    {
        q: "حدیث منزلت چیست؟",
        a: "حدیث منزلت از پیامبر (ص) خطاب به علی (ع): «انت منی بمنزلة هارون من موسی الا انه لا نبی بعدی» (تو نسبت به من مانند هارون نسبت به موسی هستی، جز اینکه پس از من پیامبری نیست). این حدیث بر خلافت و امامت علی (ع) دلالت دارد."
    },
    {
        q: "حدیث کساء چیست و چه فضیلتی دارد؟",
        a: "حدیث کساء حدیثی است که در آن پیامبر (ص) علی، فاطمه، حسن و حسین (ع) را زیر عبا جمع کرد و دعایشان کرد. این حدیث نشان‌دهنده مقام والای اهل بیت (ع) است و آیه تطهیر در این واقعه نازل شد."
    },
    {
        q: "زیارت عاشورا چیست و چه پیامی دارد؟",
        a: "زیارت عاشورا از زیارت‌های مشهور امام حسین (ع) است که در آن برائت از دشمنان اهل بیت و تولی به ایشان بیان می‌شود. این زیارت دارای سند معتبر از امام باقر (ع) است و ثواب زیادی برای آن ذکر شده است."
    },
    {
        q: "دعای کمیل چیست و چه کسی آن را انشا کرد؟",
        a: "دعای کمیل دعایی است که امام علی (ع) به کمیل بن زیاد تعلیم داد. این دعا شامل مباحث توحیدی، استغفار، درخواست رحمت و عشق به خداست. شب‌های جمعه برای خواندن آن سفارش شده است."
    },
    {
        q: "دعای ندبه چیست و چه زمانی خوانده می‌شود؟",
        a: "دعای ندبه دعایی در مدح و ثنای اهل بیت (ع) و ابراز شوق به ظهور امام زمان (عج) است. این دعا در اعیاد (عید فطر، قربان، غدیر) و صبح‌های جمعه خوانده می‌شود و نشانه انتظار فرج است."
    },
    {
        q: "دعای عهد چیست و چه آثاری دارد؟",
        a: "دعای عهد دعایی برای تجدید پیمان با امام زمان (عج) است که در صبح‌ها خوانده می‌شود. امام صادق (ع) فرمود: هر کس چهل صبح این دعا را بخواند از یاران قائم (عج) خواهد بود و اگر پیش از ظهور بمیرد، خدا او را زنده می‌کند."
    },
    {
        q: "اعتکاف چیست و چه شرایطی دارد؟",
        a: "اعتکاف ماندن در مسجد برای عبادت خدا به مدت حداقل سه روز است. شرایط: ۱- نیت ۲- ماندن در مسجد جامع ۳- روزه ۴- پرهیز از محرمات اعتکاف. اعتکاف در ماه رجب و رمضان مستحب است و ثواب زیادی دارد."
    },
    {
        q: "احکام وضو چیست و چه چیزهایی وضو را باطل می‌کند؟",
        a: "وضو با آب پاک و مباح گرفته می‌شود. مبطلات وضو: ۱- ادرار ۲- مدفوع ۳- باد معده ۴- خواب سنگین ۵- مستی ۶- کارهایی که عقل را زایل کند. وضو برای نماز، طواف و مس خط قرآن واجب است."
    },
    {
        q: "غسل چیست و چه انواعی دارد؟",
        a: "غسل شستن تمام بدن با نیت و ترتیب مخصوص است. انواع غسل واجب: ۱- جنابت ۲- حیض ۳- نفاس ۴- استحاضه ۵- مس میت ۶- غسل میت. غسل‌های مستحب: جمعه، شب قدر، عید فطر، عید قربان، احرام و... ."
    },
    {
        q: "تیمم چیست و چه زمانی انجام می‌شود؟",
        a: "تیمم代替 وضو یا غسل با خاک پاک است. موارد تیمم: ۱- نبود آب ۲- ضرر داشتن آب ۳- وقت تنگ ۴- نیاز به آب برای آشامیدن. نحوه تیمم: زدن دو کف دست بر خاک و کشیدن بر پیشانی و پشت دست‌ها."
    },
    {
        q: "اذان و اقامه در چه نمازهایی مستحب است؟",
        a: "اذان و اقامه در نمازهای یومیه (روزانه) برای مردان مستحب مؤکد است. در نمازهای دیگر مانند آیات و میت مستحب نیست. اذان قبل از اقامه گفته می‌شود و فاصله زیاد بین آنها مکروه است."
    },
    {
        q: "نماز جماعت چه فضیلتی دارد؟",
        a: "نماز جماعت ۲۷ برابر نماز فرادا ثواب دارد. پیامبر (ص) فرمود: «صلاة الجماعة تفضل صلاة الفذ بسبع و عشرین درجة». نماز جماعت باعث وحدت مسلمانان، تقویت اخوت و یادگیری احکام می‌شود."
    },
    {
        q: "نماز جمعه چیست و چه شرایطی دارد؟",
        a: "نماز جمعه دو رکعت است و به جای نماز ظهر روز جمعه خوانده می‌شود. شرایط: ۱- خطبه‌ها ۲- جماعت ۳- فاصله مناسب. در عصر غیبت، نماز جمعه واجب تخییری است (می‌توان جمعه خواند یا ظهر)."
    },
    {
        q: "نماز آیات چیست و چه زمانی واجب می‌شود؟",
        a: "نماز آیات برای رویدادهای وحشتناک واجب می‌شود: ۱- خورشید گرفتگی ۲- ماه گرفتگی ۳- زلزله ۴- صاعقه و بادهای وحشتناک ۵- هر پدیده ترسناک. این نماز دو رکعت است و پنج رکوع دارد."
    },
    {
        q: "نماز میت چگونه خوانده می‌شود؟",
        a: "نماز میت پنج تکبیر دارد و بدون رکوع و سجده است. پس از تکبیر اول شهادتین، دوم صلوات بر پیامبر، سوم دعا برای مؤمنان، چهارم دعا برای میت، پنجم سلام گفته می‌شود. وضو و رو به قبله شرط است."
    },
    {
        q: "روزه ماه رمضان چه حکمی دارد؟",
        a: "روزه ماه رمضان بر هر مسلمان بالغ و عاقل واجب است. بیماران و مسافران می‌توانند بعداً قضا کنند. زنان در حال حیض و نفاس روزه نمی‌گیرند و بعداً قضا می‌کنند. پیران و بیماران صعب‌العلاج فدیه می‌دهند."
    },
    {
        q: "زکات فطره چیست و به چه کسانی تعلق می‌گیرد؟",
        a: "زکات فطره مقدار معینی از خوراکی (حدود ۳ کیلوگرم) است که شب عید فطر برای هر نفر پرداخت می‌شود. مصرف آن به فقرا و نیازمندان است. پرداخت زکات فطره برای کسانی که شب عید فطر را درک کرده‌اند واجب است."
    },
    {
        q: "حج تمتع و حج عمره چه تفاوتی دارند؟",
        a: "حج تمتع حج واجب است که در ماه‌های حج (شوال تا ذی‌حجه) انجام می‌شود و شامل عمره تمتع و حج تمتع است. حج عمره مستحب است و در هر زمان می‌توان انجام داد. عمره شامل طواف، سعی و تقصیر است، اما حج اعمال بیشتری دارد."
    },
    {
        q: "تقیه چیست و چه حکمی دارد؟",
        a: "تقیه یعنی پنهان کردن عقیده یا عمل برای حفظ جان و مال در برابر دشمنان. تقیه در قرآن (آل عمران ۲۸) و روایات تأیید شده است. امام صادق (ع) فرمود: «تقیه دین من و دین پدرانم است»."
    },
    {
        q: "تولی و تبری یعنی چه؟",
        a: "تولی یعنی دوست داشتن اولیای خدا و پیروی از آنها. تبری یعنی بیزاری از دشمنان خدا. این دو اصل از فروع دین و از ارکان ایمان هستند. در زیارت عاشورا هر دو تجلی یافته است."
    },
    {
        q: "امر به معروف و نهی از منکر چه مراتبی دارد؟",
        a: "مراتب امر به معروف و نهی از منکر: ۱- قلبی (اظهار ناراحتی) ۲- زبانی (تذکر و نصیحت) ۳- عملی (اقدام فیزیکی با اجازه حاکم شرع). این فریضه در شرایط کنونی با تذکر لسانی و تبیین اهمیت ویژه‌ای دارد."
    },
    {
        q: "جهاد تبیین چیست و چرا رهبری بر آن تأکید دارند؟",
        a: "جهاد تبیین یعنی روشنگری و مقابله با تحریف‌ها و شبهات دشمن. رهبر انقلاب بر آن تأکید دارند زیرا دشمن با جنگ نرم و رسانه‌ای به دنبال تحریف حقایق و تغییر باورهاست. تبیین وظیفه همه آگاهان و دلسوزان است."
    },

        a: "احترام به پدر و مادر در قرآن بعد از توحید آمده است: «و قضی ربک الا تعبدوا الا ایاه و بالوالدین احساناً» (اسراء ۲۳: پروردگارت فرمان داده جز او را نپرستید و به پدر و مادر نیکی کنید). پیامبر (ص) فرمود: «رضی الرب فی رضی الوالدین و سخط الرب فی سخط الوالدین» (رضایت خدا در رضایت پدر و مادر و خشم خدا در خشم آنهاست). امام صادق (ع) فرمود: «لو علم الله شیئاً ادنی من افّ لنهی عنه» (اگر خدا چیزی کمتر از «اف» (حرف ناراحتی) می‌دانست، از آن نهی می‌کرد). امام باقر (ع) فرمود: «ثلاث لم یجعل الله لاحد فیهم رخصة: اداء الامانة الی البر و الفاجر، و الوفاء بالعهد للبر و الفاجر، و بر الوالدین برین کانا او فاجرین» (سه چیز است که خدا در آنها به هیچ کس اجازه نداده: ۱- امانت‌داری به نیکوکار و بدکار ۲- وفای به عهد به نیکوکار و بدکار ۳- نیکی به پدر و مادر چه نیکوکار باشند و چه بدکار)."
    },
    {
        q: "اهمیت صله رحم را با ذکر حدیث توضیح دهید.",
        a: "صله رحم یعنی ارتباط با خویشاوندان و نیکی به آنها. پیامبر (ص) فرمود: «صلة الرحم تزید فی العمر» (صله رحم عمر را زیاد می‌کند). امام باقر (ع) فرمود: «صلة الرحم تزکی الاعمال و تنمی الاموال و تدفع البلوی و یسر الحساب» (صله رحم اعمال را پاک می‌کند، اموال را زیاد می‌کند، بلا را دفع می‌کند و حساب را آسان می‌کند). امام صادق (ع) فرمود: «من سره ان ینسأ فی اجله و یزاد فی رزقه فلیصل رحمه» (کسی که خوشحال می‌شود عمرش طولانی و روزی‌اش زیاد شود، صله رحم کند). قطع رحم از گناهان کبیره است و پیامبر (ص) فرمود: «لا یدخل الجنة قاطع رحم» (قطع‌کننده رحم وارد بهشت نمی‌شود)."
    },
    {
        q: "اهمیت راستگویی را با ذکر آیات و احادیث توضیح دهید.",
        a: "راستگویی از مهم‌ترین فضایل اخلاقی است. قرآن می‌فرماید: «یا ایها الذین آمنوا اتقوا الله و کونوا مع الصادقین» (توبه ۱۱۹: ای مؤمنان! تقوا پیشه کنید و با راستگویان باشید). پیامبر (ص) فرمود: «علیکم بالصدق فان الصدق یهدی الی البر و ان البر یهدی الی الجنة» (بر شما باد راستگویی که راستی به نیکی می‌برد و نیکی به بهشت). امام علی (ع) فرمود: «الصدق عز و الکذب عجز» (راستی عزت است و دروغ عجز و ناتوانی). امام صادق (ع) فرمود: «لا تنظروا الی طول رکوع الرجل و سجوده فان ذلک شیء اعتاده فلو ترکه استوحش لذلک و لکن انظروا الی صدق حدیثه و اداء امانته» (به رکوع و سجود طولانی مردم نگاه نکنید، چون به آن عادت کرده و اگر ترک کند وحشت می‌کند، بلکه به راستگویی و امانتداری آنها نگاه کنید)."
    },
    {
        q: "عواقب دروغ را با ذکر آیات و احادیث توضیح دهید.",
        a: "دروغ از گناهان کبیره است و عواقب دنیوی و اخروی دارد. قرآن می‌فرماید: «انما یفتری الکذب الذین لا یؤمنون بآیات الله» (نحل ۱۰۵: فقط کسانی دروغ می‌بافند که به آیات خدا ایمان ندارند). پیامبر (ص) فرمود: «ایاکم و الکذب فان الکذب یهدی الی الفجور و ان الفجور یهدی الی النار» (از دروغ بپرهیزید که دروغ به فجور می‌برد و فجور به آتش). امام علی (ع) فرمود: «لایکذب الکذاب الا من مهانة نفسه» (دروغگو دروغ نمی‌گوید مگر به خاطر پستی نفسش). امام صادق (ع) فرمود: «ان الکذب هو خراب الایمان» (دروغ ویرانگر ایمان است). پیامبر (ص) در مورد نشانه‌های منافق فرمود: «آیة المنافق ثلاث: اذا حدث کذب و اذا وعد اخلف و اذا اؤتمن خان» (نشانه منافق سه چیز است: ۱- وقتی سخن می‌گوید دروغ می‌گوید ۲- وقتی وعده می‌دهد تخلف می‌کند ۳- وقتی امین شمرده می‌شود خیانت می‌کند)."
    },
    {
        q: "اهمیت امانتداری را با ذکر آیات و احادیث توضیح دهید.",
        a: "امانت‌داری از صفات مؤمنان است. قرآن می‌فرماید: «ان الله یأمرکم ان تؤدوا الامانات الی اهلها» (نساء ۵۸: خدا به شما فرمان می‌دهد که امانت‌ها را به اهلش بازگردانید). در صفات مؤمنان می‌فرماید: «والذین هم لاماناتهم و عهدهم راعون» (مؤمنون ۸: و آنان که امانت‌ها و پیمان خود را رعایت می‌کنند). پیامبر (ص) فرمود: «اد الامانة الی من ائتمنک و لا تَخُن من خانک» (امانت را به کسی که به تو سپرده بازگردان و به کسی که به تو خیانت کرده خیانت نکن). امام علی (ع) فرمود: «الامانة تَجر الرزق و الخیانة تَجر الفقر» (امانت‌داری روزی می‌آورد و خیانت فقر می‌آورد)."
    },
    {
        q: "اهمیت عدالت را با ذکر آیات و حدیث توضیح دهید.",
        a: "عدالت از اصول مهم اسلام است. قرآن می‌فرماید: «ان الله یأمر بالعدل و الاحسان» (نحل ۹۰: خدا به عدل و احسان فرمان می‌دهد). و نیز: «اعدلوا هو اقرب للتقوی» (مائده ۸: عدالت کنید که به تقوا نزدیک‌تر است). امام علی (ع) در تعریف عدل فرمود: «العدل یضع الامور مواضعها» (عدل هر چیز را در جای خود قرار می‌دهد). در حکومت عدل می‌فرماید: «الناس فی الدنیا عاملان: عامل عمل فی الدنیا للدنیا و قد شغلته دنیاه عن آخرته، و عامل عمل فی الدنیا لما بعدها فجاءه من الدنیا ما کفی» (مردم در دنیا دو گروهند: گروهی برای دنیا کار می‌کنند و دنیا آنها را از آخرت بازمی‌دارد، و گروهی برای آخرت کار می‌کنند و از دنیا هم به اندازه کافی بهره‌مند می‌شوند)."
    },
    {
        q: "اهمیت انصاف را با ذکر حدیث توضیح دهید.",
        a: "انصاف یعنی با دیگران چنان رفتار کنیم که دوست داریم با ما رفتار شود. امام کاظم (ع) فرمود: «انصاف الناس من نفسک» (با مردم از جانب خودت انصاف داشته باش). امام علی (ع) فرمود: «من انصف الناس من نفسه رضی بهم حکماً» (کسی که با مردم انصاف داشته باشد، آنان را به داوری خود راضی کرده است). در حدیثی دیگر فرمود: «ثمرة الانصاف اجتماع القلوب» (نتیجه انصاف، اجتماع دلهاست). امام صادق (ع) فرمود: «ان المؤمن لیرزق حسن الخلق حتی یدخل الجنة و انه لفاسق، و ان المؤمن لیدرک بحسن خلقه درجة الصائم القائم» (همانا مؤمن به خوش‌اخلاقی روزی می‌شود تا وارد بهشت شود، و همانا مؤمن با اخلاق نیکو به درجه روزه‌گیر شب‌زنده‌دار می‌رسد)."
    },
    {
        q: "اهمیت تواضع و فروتنی را با ذکر آیات و احادیث توضیح دهید.",
        a: "تواضع از صفات برجسته مؤمنان است. قرآن می‌فرماید: «و عباد الرحمن الذین یمشون علی الارض هوناً» (فرقان ۶۳: بندگان خدای رحمان کسانی هستند که بر زمین با فروتنی راه می‌روند). پیامبر (ص) فرمود: «من تواضع لله رفعه الله» (هر کس برای خدا تواضع کند، خدا او را بالا می‌برد). امام علی (ع) فرمود: «ثمرة التواضع المحبة» (نتیجه تواضع، محبت است). امام صادق (ع) فرمود: «التواضع اصل کل خیر» (تواضع ریشه هر خوبی است). در مقابل، تکبر مذموم است و پیامبر (ص) فرمود: «لایدخل الجنة من کان فی قلبه مثقال ذرة من کبر» (کسی که ذره‌ای کبر در دل داشته باشد وارد بهشت نمی‌شود)."
    },
    {
        q: "اهمیت عفو و گذشت را با ذکر آیات و احادیث توضیح دهید.",
        a: "عفو و گذشت از صفات نیکوی مؤمنان است. قرآن می‌فرماید: «و لیعفوا و لیصفحوا الا تحبون ان یغفر الله لکم» (نور ۲۲: عفو کنید و بگذرید، آیا دوست ندارید خدا شما را بیامرزد؟). پیامبر (ص) فرمود: «علیکم بالعفو فان العفو لا یزید العبد الا عزاً فتعافوا یعزکم الله» (بر شما باد به عفو که عفو بر عزت بنده می‌افزاید، پس یکدیگر را عفو کنید تا خدا شما را عزت دهد). امام علی (ع) فرمود: «اجمل العفو ما کان عن قدرة» (زیباترین عفو آن است که با قدرت باشد). امام صادق (ع) فرمود: «من عفا عن مظلمة جبره الله فی الدنیا و الآخرة» (کسی که از ستمی که به او شده بگذرد، خدا در دنیا و آخرت او را جبران می‌کند)."
    },
    {
        q: "اهمیت صبر را با ذکر آیات و احادیث توضیح دهید.",
        a: "صبر از فضایل بزرگ اخلاقی است. قرآن می‌فرماید: «ان الله مع الصابرین» (بقره ۱۵۳: خدا با صابران است). و نیز: «انما یوفی الصابرون اجرهم بغیر حساب» (زمر ۱۰: صابران پاداش خود را بی‌حساب دریافت می‌کنند). امام علی (ع) در تقسیم صبر فرمود: «الصبر ثلاثة: صبر عند المصیبة، و صبر علی الطاعة، و صبر عن المعصیة» (صبر سه نوع است: صبر در مصیبت، صبر بر طاعت، صبر از گناه). پیامبر (ص) فرمود: «الصبر نصف الایمان» (صبر نیمی از ایمان است). امام صادق (ع) فرمود: «الصبر من الایمان بمنزلة الرأس من الجسد» (صبر نسبت به ایمان مانند سر نسبت به بدن است)."
    },
    {
        q: "اهمیت شکرگزاری را با ذکر آیات و احادیث توضیح دهید.",
        a: "شکرگزاری از نعمت‌های الهی باعث افزایش آنهاست. قرآن می‌فرماید: «لئن شکرتم لازیدنکم و لئن کفرتم ان عذابی لشدید» (ابراهیم ۷: اگر شکر کنید می‌افزایم و اگر ناسپاسی کنید عذاب من شدید است). پیامبر (ص) فرمود: «من لا یشکر الناس لا یشکر الله» (کسی که از مردم تشکر نکند، از خدا هم تشکر نکرده است). امام علی (ع) فرمود: «شکر النعمة یمنع من زوالها» (شکر نعمت از زوال آن جلوگیری می‌کند). امام صادق (ع) فرمود: «شکر النعمة اجتناب المحارم» (شکر نعمت، دوری از گناهان است). شکر سه مرحله دارد: شکر قلبی (باور اینکه نعمت از خداست)، شکر زبانی (حمد و سپاس)، شکر عملی (استفاده از نعمت در راه خدا)."
    },
    {
        q: "اهمیت قناعت را با ذکر حدیث توضیح دهید.",
        a: "قناعت به معنای رضایت به داشته‌ها و دوری از حرص است. پیامبر (ص) فرمود: «لیس الغنی عن کثرة العرض انما الغنی غنی النفس» (بی‌نیازی به زیادی مال نیست، بی‌نیازی بی‌نیازی دل است). امام علی (ع) فرمود: «القناعة مال لا ینفد» (قناعت مالی است که تمام نمی‌شود). امام صادق (ع) فرمود: «من قنع بما رزقه الله فهو من اغنی الناس» (کسی که به آنچه خدا روزی‌اش کرده قناعت کند، از بی‌نیازترین مردم است). امام حسین (ع) در دعای عرفه فرمود: «اللهم انی اسالک الغنی فی الفقر» (خدایا از تو بی‌نیازی در فقر می‌خواهم). قناعت باعث آرامش، عزت نفس و برکت در زندگی می‌شود."
    },
    {
        q: "اهمیت سخاوت را با ذکر آیات و حدیث توضیح دهید.",
        a: "سخاوت و بخشندگی از صفات مؤمنان است. قرآن می‌فرماید: «و ما تنفقوا من خیر فلانفسکم» (بقره ۲۷۲: هر چه انفاق کنید به سود خود شماست). پیامبر (ص) فرمود: «السخاء شجرة من اشجار الجنة» (سخاوت درختی از درختان بهشت است). امام صادق (ع) فرمود: «السخاء من اخلاق الانبیاء» (سخاوت از اخلاق پیامبران است). امام علی (ع) فرمود: «السخی قریب من الله قریب من الناس قریب من الجنة» (انسان سخاوتمند به خدا نزدیک است، به مردم نزدیک است و به بهشت نزدیک است). در مقابل، بخل مذموم است و قرآن می‌فرماید: «و من یوق شح نفسه فاولئک هم المفلحون» (حشر ۹: کسانی که از بخل نفس خود بازداشته شوند، رستگارند)."
    },
    {

        a: "تفکر در آیات الهی و آفرینش از عبادات بزرگ است. قرآن می‌فرماید: «ان فی خلق السموات و الارض و اختلاف اللیل و النهار لایات لاولی الالباب» (آل عمران ۱۹۰: همانا در آفرینش آسمان‌ها و زمین و آمد و شد شب و روز نشانه‌هایی برای خردمندان است). پیامبر (ص) فرمود: «تفکر ساعة خیر من عبادة سنة» (یک ساعت تفکر از یک سال عبادت بهتر است). امام علی (ع) فرمود: «الفکر مرآة صافیة» (اندیشه آیینه‌ای شفاف است). امام صادق (ع) فرمود: «افضل العبادة ادمان التفکر فی الله و فی قدرته» (برترین عبادت، مداومت بر تفکر در خدا و قدرت اوست). تفکر باعث شناخت خدا، خودشناسی و عبرت‌آموزی می‌شود."
    },
    {
        q: "اهمیت علم‌آموزی را با ذکر آیات و احادیث توضیح دهید.",
        a: "علم‌آموزی از مهم‌ترین وظایف مسلمانان است. قرآن می‌فرماید: «هل یستوی الذین یعلمون و الذین لا یعلمون» (زمر ۹: آیا کسانی که می‌دانند با کسانی که نمی‌دانند برابرند؟). پیامبر (ص) فرمود: «طلب العلم فریضة علی کل مسلم» (طلب علم بر هر مسلمانی واجب است). امام علی (ع) فرمود: «العلم خیر من المال، العلم یحرسک و انت تحرس المال» (علم از مال بهتر است، علم از تو محافظت می‌کند و تو از مال محافظت می‌کنی). امام صادق (ع) فرمود: «من تعلم علماً و عمل به و علم لله دعی فی ملکوت السموات عظیماً» (کسی که علمی بیاموزد و به آن عمل کند و برای خدا آموزش دهد، در ملکوت آسمان‌ها او را بزرگ خطاب می‌کنند)."
    },
    {

        a: "معلمی شغل انبیاست و مقام والایی دارد. پیامبر (ص) فرمود: «العلماء ورثة الانبیاء» (علما وارث پیامبران هستند). امام علی (ع) فرمود: «من علمنی حرفاً فقد صیرنی عبداً» (کسی که به من حرفی بیاموزد، مرا بنده خود کرده است). این سخن نشان‌دهنده نهایت احترام به معلم است. امام صادق (ع) فرمود: «مجلس العلم یحیی العلم و یمحی الجهل» (مجلس علم، علم را زنده و جهل را نابود می‌کند). پیامبر (ص) فرمود: «لیس منا من لم یوقر کبیرنا و یرحم صغیرنا و یعرف لعالمنا حقه» (از ما نیست کسی که به بزرگ ما احترام نگذارد و به کوچک ما رحم نکند و حق عالم ما را نشناسد). معلم امانت‌دار علم و هدایتگر جامعه است."
    },
    {

        a: "پاکیزگی از ایمان است و در اسلام بسیار تأکید شده. پیامبر (ص) فرمود: «النظافة من الایمان» (پاکیزگی از ایمان است). امام علی (ع) فرمود: «تطهروا فان الاسلام نظیف» (پاکیزه باشید که اسلام پاک است). امام صادق (ع) فرمود: «من نظف ثوبه لم یزل فی سرور» (کسی که لباسش را پاکیزه کند، همواره در شادی است). پیامبر (ص) به مسواک زدن بسیار سفارش می‌فرمود: «السواک مطهرة للفم مرضاة للرب» (مسواک دهان را پاک و خدا را خشنود می‌کند). وضو، غسل، مسواک، نظافت لباس و خانه از مستحبات مؤکد است. پاکیزگی باعث سلامت جسم و روح و محبوبیت نزد دیگران است."
    },
    {

        a: "سلامتی نعمت بزرگ الهی است. پیامبر (ص) فرمود: «نعمتان مغبون فیهما کثیر من الناس: الصحة و الفراغ» (دو نعمت است که بسیاری از مردم در آنها دچار خسرانند: سلامتی و فراغت). امام علی (ع) فرمود: «الصحة افضل النعم» (سلامتی بهترین نعمت‌هاست). امام صادق (ع) فرمود: «الصحة نعمة خفیة» (سلامتی نعمتی پنهان است). پیامبر (ص) در دعا می‌فرمود: «اللهم انی اسالک العافیة فی الدنیا و الآخرة» (خدایا از تو عافیت در دنیا و آخرت می‌خواهم). حفظ سلامتی با تغذیه مناسب، ورزش، خواب کافی و پرهیز از آسیب‌ها واجب است."

    {

    {

        a: "حفاظت از محیط زیست در اسلام سفارش شده است. پیامبر (ص) فرمود: «ما من مسلم یغرس غرساً او یزرع زرعاً فیا کل منه طیر او انسان او بهیمة الا کان له به صدقة» (هیچ مسلمانی نیست که نهالی بکارد یا کشتی بکارد و پرنده یا انسان یا حیوانی از آن بخورد، مگر اینکه برایش صدقه محسوب می‌شود). امام علی (ع) فرمود: «احفظوا الارض فانها امکم» (زمین را حفظ کنید که مادر شماست). امام صادق (ع) فرمود: «لا تقطعوا الثمار فان الله یحب من غرس شجراً» (میوه‌ها را قطع نکنید که خدا دوست دارد کسی را که درختی می‌کارد). در اسلام، اسراف در آب، قطع درختان بی‌مورد، آلودگی محیط زیست ممنوع است. زمین امانت الهی است و باید برای آیندگان حفظ شود."

        a: "ریا از گناهان کبیره است. قرآن می‌فرماید: «فویل للمصلین * الذین هم عن صلاتهم ساهون * الذین هم یراؤون» (ماعون ۴-۶: وای بر نمازگزارانی که از نمازشان غافلند و ریاکاری می‌کنند). پیامبر (ص) فرمود: «ان اخشى ما اخاف علیکم الشرک الاصغر» (بیشترین چیزی که بر شما می‌ترسم شرک اصغر است). پرسیدند: شرک اصغر چیست؟ فرمود: «الریاء» (ریا). امام علی (ع) فرمود: «الریاء شجرة لا تثمر الا الاثم» (ریا درختی است که جز گناه ثمر نمی‌دهد). امام صادق (ع) فرمود: «ان الله یقول: انا خیر شریک فمن عمل لی و لغیری فهو لمن عمل لغیری» (خدا می‌فرماید: من بهترین شریکم، کسی که برای من و غیر من کار کند، برای غیر من است). ریا عمل را باطل می‌کند."
    },
    {

    {

        a: "فرزندان بر والدین حقوقی دارند. پیامبر (ص) فرمود: «ان لولدک علیک حقاً» (فرزندت بر تو حقی دارد). امام علی (ع) فرمود: «من حقوق الولد علی الوالد ان یحسن اسمه و یحسن ادبه و یعلمه القرآن» (از حقوق فرزند بر پدر: نام نیکو نهادن، ادب نیکو آموختن و قرآن تعلیم دادن). امام سجاد (ع) در رساله الحقوق فرمود: «و اما حق ولدک فان تعلم انه منک و مضاف الیک فی عاجل الدنیا بخیره و شره» (حق فرزندت این است که بدانی او از توست و در خوبی و بدی به تو منسوب است). امام صادق (ع) فرمود: «الولد الصالح ریحانة من ریاحین الجنة» (فرزند صالح ریحانه‌ای از ریحانه‌های بهشت است)."
    },
    {

    },
    {

    {

        q: "اهمیت مسجد را با ذکر حدیث توضیح دهید.",
        a: "مسجد خانه خدا و محل عبادت مؤمنان است. قرآن می‌فرماید: «فی بیوت اذن الله ان ترفع و یذکر فیها اسمه» (نور ۳۶: در خانه‌هایی که خدا اجازه داده بالا برده شود و نامش در آنها یاد شود). پیامبر (ص) فرمود: «من بنی مسجداً لله بنی الله له بیتاً فی الجنة» (کسی که مسجدی برای خدا بسازد، خدا برای او خانه‌ای در بهشت می‌سازد). امام علی (ع) فرمود: «المسجد بیت کل تقی» (مسجد خانه هر پرهیزگاری است). امام صادق (ع) فرمود: «من مشی الی المسجد لم یضع قدمه علی رطب و لا یابس الا سبحت له الارض» (کسی که به سوی مسجد گام بردارد، پایش را بر هیچ تر و خشکی نمی‌گذارد مگر اینکه زمین برایش تسبیح می‌گوید)."
    },
    {
        q: "اهمیت دعا برای دیگران را با ذکر حدیث توضیح دهید.",
        a: "دعا برای دیگران مستجاب‌تر است. پیامبر (ص) فرمود: «دعوة المرء المسلم لاخیه بظهر الغیب مستجابة» (دعای مسلمان برای برادرش در غیاب او مستجاب است). امام علی (ع) فرمود: «ما من مؤمن یدعو لاخیه المؤمن فی ظهر الغیب الا وکل الله به ملکاً یقول و لک مثل ذلک» (هیچ مؤمنی نیست که برای برادر مؤمنش در غیاب او دعا کند مگر خدا فرشته‌ای بر او می‌گمارد که بگوید: و برای تو هم همانند آن باشد). امام صادق (ع) فرمود: «من دعا لاخیه بظهر الغیب نودی من السماء و لک مائة الف ضعف» (کسی که برای برادرش در غیابش دعا کند، از آسمان ندا می‌شود: برای تو صد هزار برابر آن است)."
    },
    {
        q: "اهمیت استغفار را با ذکر آیات و حدیث توضیح دهید.",
        a: "استغفار طلب آمرزش از خداست. قرآن می‌فرماید: «فقلت استغفروا ربکم انه کان غفاراً * یرسل السماء علیکم مدراراً * و یمددکم باموال و بنین» (نوح ۱۰-۱۲: از پروردگارتان آمرزش بخواهید که او بسیار آمرزنده است، آسمان را بر شما ریزان می‌کند و شما را با اموال و فرزندان یاری می‌کند). پیامبر (ص) فرمود: «من لزم الاستغفار جعل الله له من کل ضیق مخرجاً و من کل هم فرجاً و رزقه من حیث لا یحتسب» (کسی که مداومت بر استغفار کند، خدا از هر تنگنایی راهی و از هر غمی گشایشی برایش قرار دهد و از جایی که گمان ندارد روزی‌اش دهد). امام علی (ع) فرمود: «علیکم بالاستغفار فان به تغفر لکم الذنوب» (بر شما باد استغفار که با آن گناهانتان آمرزیده می‌شود)."
    },
    {
        q: "اهمیت ذکر خدا را با ذکر آیات و حدیث توضیح دهید.",
        a: "ذکر خدا آرامش‌بخش دلهاست. قرآن می‌فرماید: «الا بذکر الله تطمئن القلوب» (رعد ۲۸: آگاه باشید که با یاد خدا دلها آرام می‌گیرد). پیامبر (ص) فرمود: «فضل الذکر کفضل الحی علی المیت» (فضیلت ذکر خدا مانند فضیلت زنده بر مرده است). امام علی (ع) فرمود: «ذکر الله ریحان المؤمنین» (ذکر خدا ریحان (گل خوشبو) مؤمنان است). امام صادق (ع) فرمود: «من اکثر ذکر الله احبه الله» (کسی که زیاد خدا را یاد کند، خدا او را دوست دارد). ذکر خدا باعث روشنایی دل، دوری از گناه و افزایش ایمان است."
    },
    {
        q: "اهمیت صلوات فرستادن را با ذکر حدیث توضیح دهید.",
        a: "صلوات بر محمد و آل محمد (ص) فضیلت بسیار دارد. قرآن می‌فرماید: «ان الله و ملائکته یصلون علی النبی یا ایها الذین آمنوا صلوا علیه و سلموا تسلیماً» (احزاب ۵۶: خدا و فرشتگان بر پیامبر درود می‌فرستند، ای مؤمنان بر او درود فرستید و سلام گویید). پیامبر (ص) فرمود: «من صلی علی واحدة صلى الله علیه عشراً» (کسی که یک بار بر من صلوات فرستد، خدا ده بار بر او رحمت فرستد). امام علی (ع) فرمود: «ما من دعاء الا و بینه و بین السماء حجاب حتی یصلی علی محمد و آل محمد» (هیچ دعایی نیست مگر اینکه بین آن و آسمان حجابی است تا بر محمد و آل محمد صلوات فرستاده شود). صلوات دعا را مستجاب می‌کند."
    },
    {
        q: "اهمیت توبه نصوح را با ذکر آیات و حدیث توضیح دهید.",
        a: "توبه نصوح توبه‌ای خالص و واقعی است. قرآن می‌فرماید: «یا ایها الذین آمنوا توبوا الی الله توبة نصوحاً» (تحریم ۸: ای مؤمنان! به درگاه خدا توبه کنید، توبه‌ای خالص). امام صادق (ع) در تفسیر توبه نصوح فرمود: «هو الرجل یتوب من ذنب ثم لا یعود فیه» (توبه نصوح آن است که مرد از گناه توبه کند و دیگر به آن بازنگردد). امام باقر (ع) فرمود: «التوبة النصوح ان یبغض الذنب کما احبه، و ان یستغفر منه اذا ذکره» (توبه نصوح آن است که گناه را چنان که دوست داشته بداند، و هر وقت به یاد آورد استغفار کند). توبه نصوح با پشیمانی، ترک گناه، جبران حق‌الناس و تصمیم بر ترک کامل می‌شود."
    },
    {

        a: "شب قدر بهترین شب سال است. قرآن می‌فرماید: «لیلة القدر خیر من الف شهر» (قدر ۳: شب قدر از هزار ماه بهتر است). پیامبر (ص) فرمود: «من قام لیلة القدر ایماناً و احتساباً غفر له ما تقدم من ذنبه» (کسی که شب قدر را از روی ایمان و حساب‌رسى (به خدا) احیا کند، گناهان گذشته‌اش آمرزیده مى‌شود). امام علی (ع) فرمود: «التمسوا لیلة القدر فی العشر الاواخر من رمضان» (شب قدر را در دهه آخر رمضان بجویید). امام صادق (ع) فرمود: «التقدیر فی لیلة تسعة عشر و الابرام فی لیلة احدی و عشرین و الامضاء فی لیلة ثلاث و عشرین» (تقدیر در شب نوزدهم، تحکیم در شب بیست و یکم و امضا در شب بیست و سوم است)."
    },

    },
    {

    },
    {

    },
    {

    },
    {

    },

    },

    },
    {

    {
        q: "اهمیت امانت‌داری را با ذکر آیات و حدیث توضیح دهید.",
        a: "امانت‌داری از صفات مؤمنان است. قرآن می‌فرماید: «ان الله یأمرکم ان تؤدوا الامانات الی اهلها» (نساء ۵۸: خدا به شما فرمان می‌دهد که امانت‌ها را به اهلش بازگردانید). پیامبر (ص) فرمود: «اد الامانة الی من ائتمنک و لا تَخُن من خانک» (امانت را به کسی که به تو سپرده بازگردان و به کسی که به تو خیانت کرده خیانت نکن). امام علی (ع) فرمود: «الامانة تَجر الرزق و الخیانة تَجر الفقر» (امانت‌داری روزی می‌آورد و خیانت فقر می‌آورد). امام صادق (ع) فرمود: «لا تنظروا الی طول رکوع الرجل و سجوده فان ذلک شیء اعتاده فلو ترکه استوحش لذلک و لکن انظروا الی صدق حدیثه و اداء امانته» (به رکوع و سجود طولانی مردم نگاه نکنید، بلکه به راستگویی و امانتداری آنها نگاه کنید)."
    }
];
        // تشخیص خودکار دستگاه
        function detectDevice() {
            const ua = navigator.userAgent;
            const width = window.innerWidth;
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
            const isTablet = /iPad|Android(?!.*Mobile)|Tablet|KF|Silk/i.test(ua) || (width >= 600 && width <= 1024 && isMobile);

            if (isTablet || (width >= 600 && width <= 1024 && isMobile)) return 'tablet';
            if (isMobile || width < 600) return 'mobile';
            return 'desktop';
        }

        const device = detectDevice();
        const deviceSpan = document.getElementById('deviceTypeText');
        if (device === 'mobile') {
            deviceSpan.innerHTML = '📱 گوشی موبایل — نمایش عمودی';
        } else if (device === 'tablet') {
            deviceSpan.innerHTML = '📟 تبلت — نمایش بهینه';
        } else {
            deviceSpan.innerHTML = '💻 لپ‌تاپ/کامپیوتر — فضای کامل';
        }

        // ترکیب همه سوالات در یک بانک اصلی
        const fullQuestionBank = {
            religion: religionQuestions,
            political: politicalQuestions,
            general: generalQuestions,
            ethics: ethicsQuestions,
            combined: combinedQuestions
        };

        // محاسبه تعداد کل
        let totalCount = 0;
        for (let cat in fullQuestionBank) {
            totalCount += fullQuestionBank[cat].length;
        }
        document.getElementById('totalCount').innerText = totalCount + '+';

        // تابع دریافت سوالات بر اساس فصل
        function getQuestionsByChapter(chapter) {
            return fullQuestionBank[chapter] || [];
        }

        // نمایش فصل فعال
        const chapterContent = document.getElementById('chapterContent');
        const tabButtons = document.querySelectorAll('.tab-btn');

        function renderChapter(chapterId) {
            // نمایش لودینگ
            chapterContent.innerHTML = '<div style="text-align: center; padding: 50px 0;"><div class="loading-spinner"></div><p style="margin-top: 20px; color: #1e3a5f;">در حال بارگذاری سوالات...</p></div>';
            
            // استفاده از setTimeout برای جلوگیری از هنگ کردن
            setTimeout(() => {
                const qas = getQuestionsByChapter(chapterId);
                if (qas.length === 0) {
                    chapterContent.innerHTML = '<div class="qa-item">هنوز سوالی برای این دسته اضافه نشده است.</div>';
                    return;
                }

                let html = '';
                // نمایش فقط ۵۰ سوال اول برای بهبود کارایی
                const displayQas = qas.slice(0, 50);
                displayQas.forEach((item, idx) => {
                    // تشخیص آیات و احادیث برای نمایش دکمه‌های اشتراک
                    const isAyahHadith = item.q.includes('حدیث') || item.q.includes('آیه') || chapterId === 'ethics';
                    
                    html += `<div class="qa-item">
                        <div class="question">${item.q}</div>
                        <div class="answer">
                            <p>${item.a}</p>`;
                    
                    if (isAyahHadith) {
                        const shareText = `${item.q} | ${item.a}`.replace(/'/g, "\\'");
                        html += `<div class="share-ayah">
                            <button class="btn-icon" onclick="window.copyText('${shareText}')">📋 کپی آیه/حدیث</button>
                            <button class="btn-icon" onclick="window.shareText('${shareText}')">📤 اشتراک‌گذاری</button>
                        </div>`;
                    }
                    
                    html += `</div></div>`;
                });
                
                // نمایش پیام تعداد کل سوالات
                if (qas.length > 50) {
                    html += `<div style="text-align: center; padding: 20px; background: #f0f4fa; border-radius: 30px; margin-top: 20px;">
                        <p style="color: #1e3a5f;">✨ نمایش ۵۰ سوال از ${qas.length} سوال موجود. برای مشاهده بقیه سوالات، بخش‌های مختلف را مرور کنید.</p>
                    </div>`;
                }
                
                chapterContent.innerHTML = html;
            }, 100); // تاخیر ۱۰۰ میلی‌ثانیه برای نمایش لودینگ
        }

        // تابع نمایش اطلاعات سازندگان
        window.showCreatorInfo = function() {
            alert('👨‍💻 سازنده اصلی برنامه: محمدمهدی مرادیان\n\n✅ این برنامه با ظرفیت ۱۰۰۰+ سوال طراحی شده است.\n✅ تمامی سوالات بر اساس منابع معتبر گردآوری شده.\n✅ برای مصاحبه دانشگاه فرهنگیان مناسب می‌باشد.\n\n📌 برای اضافه کردن سوالات جدید، در بخش بانک سوالات (Questions) موارد جدید را اضافه کنید.');
        };

        // توابع سراسری برای کپی و اشتراک
        window.copyText = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('✅ متن در حافظه کپی شد');
            }).catch(() => {
                alert('کپی با مشکل مواجه شد');
            });
        };

        window.shareText = function(text) {
            if (navigator.share) {
                navigator.share({
                    title: 'دانشگاه فرهنگیان',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text);
                alert('✅ متن کپی شد - می‌توانید در پیامرسان مورد نظر paste کنید');
            }
        };

        // رویداد کلیک تب‌ها
        tabButtons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                tabButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const chapter = this.dataset.chapter;
                renderChapter(chapter);
            });
        });

        // بارگذاری پیش‌فرض (فصل دینی) با تاخیر
        setTimeout(() => {
            renderChapter('religion');
        }, 200);

        // ممانعت از کپی
        document.addEventListener('copy', (e) => { e.preventDefault(); return false; });
        document.addEventListener('cut', (e) => { e.preventDefault(); return false; });
        document.addEventListener('contextmenu', (e) => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'x' || e.key === 'a' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    })();
</script>

</html>
